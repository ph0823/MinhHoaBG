<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Excel - Tin 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0fdf4; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hidden-screen { display: none !important; }
        .option-btn { transition: all 0.2s ease-in-out; }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .correct {
            background-color: #dcfce7 !important; 
            color: #166534 !important;
            border-color: #22c55e !important;
        }
        .wrong {
            background-color: #fee2e2 !important; 
            color: #991b1b !important;
            border-color: #ef4444 !important;
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 select-none">

    <div class="bg-white max-w-2xl w-full rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <div id="login-screen" class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-green-600 mb-2">Trắc Nghiệm Tin Học</h1>
                <p class="text-gray-500">Excel - Làm quen với trang tính (tt)</p>
                
            </div>
            
            <form id="info-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Lớp:</label>
                    <select id="class-input" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 bg-white">
                        <option value="" disabled selected>Chọn lớp...</option>
                        <option value="7.1">7.1</option>
                        <option value="7.2">7.2</option>
                        <option value="7.3">7.3</option>
                        <option value="7.4">7.4</option>
                        <option value="7.5">7.5</option>                        
                        <option value="7.6">7.6</option>
                        <option value="7.7">7.7</option>
                        <option value="7.8">7.8</option>
                        <option value="7.9">7.9</option>
                        <option value="7.10">7.10</option>
                        <option value="7.11">7.11</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Số thứ tự:</label>
                    <input type="number" id="id-input" required placeholder="VD: 15" min="1" max="60" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Họ và tên học sinh:</label>
                    <input type="text" id="name-input" required placeholder="Nhập họ và tên có dấu..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                </div>
                <button id="start-btn" type="submit" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg mt-6 hover:bg-green-600 transition duration-200">
                    Bắt đầu làm bài
                </button>
            </form>
        </div>

        <div id="quiz-screen" class="hidden-screen flex-col h-full">
            <div class="bg-blue-50 p-4 border-b border-blue-100 flex flex-wrap justify-between items-center text-sm md:text-base gap-2">
                <div><span class="font-bold text-blue-800" id="display-name">Học sinh: ...</span></div>
                <div class="text-gray-700 font-medium flex items-center">
                    <span id="display-class" class="mr-3">Lớp: ...</span>
                    <span id="display-id" class="mr-4">STT: ...</span>
                    <span id="timer-display" class="bg-red-100 text-red-600 font-bold px-3 py-1 rounded-full shadow-sm border border-red-200">05:00</span>
                </div>
            </div>

            <div class="p-6 md:p-8">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-bold text-gray-800" id="question-number">Câu 1/20</h2>
                </div>
                
                <p class="text-lg text-gray-800 mb-6 font-medium leading-relaxed" id="question-text">Đang tải câu hỏi...</p>

                <div id="options-container" class="space-y-3">
                    </div>

                <div class="mt-4 text-center h-8">
                    <p id="feedback-text" class="text-lg transition-opacity duration-200"></p>
                </div>

                <div class="mt-6 flex justify-between items-center border-t pt-4">
                    <button id="prev-btn" onclick="goPrev()" class="bg-gray-200 text-gray-700 font-bold py-2 px-6 rounded-lg hover:bg-gray-300 transition duration-200 invisible">
                        ⬅️ Câu trước
                    </button>
                    <button id="next-btn" onclick="goNext()" class="bg-blue-500 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-600 shadow-md transition duration-200 invisible">
                        Câu tiếp ➡️
                    </button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden-screen p-8 text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-4" id="finish-title">Hoàn thành!</h2>
            <div class="bg-gray-50 rounded-xl p-6 mb-6 inline-block border border-gray-200 shadow-sm">
                <p class="text-gray-600 mb-2 font-medium" id="result-student-info">Học sinh: ...</p>
                <p class="text-6xl font-black text-green-500 mb-2" id="score-display">0.0</p>
                <p class="text-gray-500 font-semibold">Điểm (Thang 10)</p>
                <p class="mt-4 text-blue-600 font-bold" id="correct-count">Đúng ngay lần đầu: 0/20</p>
                <p id="save-status" class="text-sm font-semibold text-gray-500 mt-3 bg-gray-200 inline-block px-4 py-1 rounded-full">⏳ Đang lưu kết quả...</p>
            </div>
            <p class="text-gray-700 font-medium mb-8" id="feedback-message"></p>
            <button onclick="location.reload()" class="bg-blue-500 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-600 shadow-md transition duration-200">
                Làm lại bài
            </button>
        </div>

    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());

        const CONFIG = {
            googleSheetURL: "https://script.google.com/macros/s/AKfycbyN-3m_Z_-3Z6yaj_FO1NhGAlICmheLfCG-_LfPWgKOLYHixbvvJzlH2KN9vy97Z7oc/exec",
            sheetName: "K7b7", topic: "Trang tính Excel"
        };

        const TOTAL_QUESTIONS = 20;
        const TIME_LIMIT = 5 * 60; 
        
        let allQuizData = [];
        let questions = [];
        let questionStates = []; // Mảng quan trọng để ghi nhớ trạng thái từng câu
        let currentQuestionIndex = 0;
        let scoreCount = 0; 
        
        let timeLeft = TIME_LIMIT;
        let timerInterval;
        let userMistakes = []; 

        let studentClass = "", studentId = "", studentName = "";

        const loginScreen = document.getElementById('login-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const infoForm = document.getElementById('info-form');

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        infoForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            studentClass = document.getElementById('class-input').value;
            let rawId = document.getElementById('id-input').value.trim();
            let rawName = document.getElementById('name-input').value.trim();

            // --- 1. KIỂM TRA SỐ THỨ TỰ (STT) ---
            // Phải là số nguyên và nằm trong khoảng 1 - 60
            let sttNum = parseInt(rawId, 10);
            if (!/^\d+$/.test(rawId) || sttNum < 1 || sttNum > 60) {
                alert("STT không hợp lệ! Vui lòng chỉ nhập số nguyên từ 1 đến 60.");
                document.getElementById('id-input').focus();
                return;
            }
            studentId = rawId;

            // --- 2. CHUẨN HOÁ HỌ TÊN (Tự động viết hoa, xóa khoảng trắng) ---
            studentName = rawName
                .replace(/\s+/g, ' ') 
                .toLowerCase()        
                .replace(/(^|\s)\S/g, function(letter) { return letter.toUpperCase(); });

            // --- 3. KIỂM TRA HỌ VÀ TÊN (Bằng Regex) ---
            const nameRegex = /^[a-zA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂẠẢẤẦẨẪẬẮẰẲẴẶẸẺẼỀỀỂẾưăạảấầẩẫậắằẳẵặẹẻẽềềểếỄỆỈỊỌỎỐỒỔỖỘỚỜỞỠỢỤỦỨỪễệỉịọỏốồổỗộớờởỡợụủứừỮỰỲỴÝỶỸửữựỳỵỷỹ\s]+$/;
            
            if (!nameRegex.test(studentName)) {
                alert("Họ và tên không hợp lệ! Vui lòng chỉ nhập chữ cái tiếng Việt (không dùng số hay ký hiệu đặc biệt).");
                document.getElementById('name-input').focus();
                return;
            }

            if (studentName.length < 3 || studentName.length > 50) {
                alert("Họ và tên phải có độ dài từ 3 đến 50 ký tự.");
                document.getElementById('name-input').focus();
                return;
            }

            // Ngăn chặn gõ lặp lại 1 ký tự 4 lần liên tiếp (VD: aaaa, hahahahaha)
            if (/(.)\1{3,}/.test(studentName.replace(/\s/g, ''))) {
                alert("Họ và tên không hợp lệ (phát hiện ký tự gõ lặp lại bất thường)!");
                document.getElementById('name-input').focus();
                return;
            }

            // Nếu vượt qua kiểm tra tính hợp lệ thông tin học sinh thì mới bắt đầu tải dữ liệu
            const startBtn = document.getElementById('start-btn');
            startBtn.textContent = "Đang tải dữ liệu..."; startBtn.disabled = true;

            try {
                const response = await fetch('t7cdEb7.json');
                if (!response.ok) throw new Error("Không tìm thấy file JSON");
                allQuizData = await response.json();

                document.getElementById('display-name').textContent = `Học sinh: ${studentName}`;
                document.getElementById('display-class').textContent = `Lớp: ${studentClass}`;
                document.getElementById('display-id').textContent = `STT: ${studentId}`;
                document.getElementById('result-student-info').textContent = `${studentName} - Lớp ${studentClass} - STT ${studentId}`;

                // Trộn câu hỏi và khởi tạo trạng thái
                questions = selectQuestions();
                
                // Chuẩn bị biến state để lưu vết thao tác của học sinh
                questionStates = questions.map(q => {
                    let opts = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
                    return {
                        passed: false,          // Đã vượt qua câu này chưa?
                        wrongFirstTry: false,   // Có chọn sai ngay lần chạm đầu không?
                        clickedWrongIdxs: [],   // Lưu các đáp án sai đã bấm
                        shuffledOptions: shuffleArray(opts) // Xáo trộn cố định cho riêng câu này
                    };
                });

                currentQuestionIndex = 0;
                scoreCount = 0; userMistakes = []; timeLeft = TIME_LIMIT;

                loginScreen.classList.add('hidden-screen');
                quizScreen.classList.remove('hidden-screen');
                quizScreen.classList.add('flex');

                startTimer();
                loadQuestion();

            } catch (error) {
                alert("Lỗi: " + error.message);
                startBtn.textContent = "Bắt đầu làm bài"; startBtn.disabled = false;
            }
        });

        function selectQuestions() {
            let stats = JSON.parse(localStorage.getItem('excelStats_THCS')) || {};
            let scoredQuestions = allQuizData.map(q => {
                let stat = stats[q.id] || { attempts: 0, wrongFirstTry: 0 };
                let priorityScore = (stat.attempts === 0) ? 100 : (stat.wrongFirstTry / stat.attempts) * 50;
                return { question: q, score: priorityScore + Math.random() * 10 };
            });
            scoredQuestions.sort((a, b) => b.score - a.score);
            let count = Math.min(TOTAL_QUESTIONS, allQuizData.length);
            return shuffleArray(scoredQuestions.slice(0, count).map(sq => sq.question));
        }

        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
                timerDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if(timeLeft <= 30) {
                    timerDisplay.classList.add('bg-red-500', 'text-white');
                    timerDisplay.classList.remove('bg-red-100', 'text-red-600');
                }
                if (timeLeft <= 0) finishQuiz("Hết thời gian làm bài!");
            }, 1000);
        }

        // --- TẢI CÂU HỎI VÀ KHÔI PHỤC TRẠNG THÁI ---
        function loadQuestion() {
            const qData = questions[currentQuestionIndex];
            const state = questionStates[currentQuestionIndex];
            
            document.getElementById('question-number').textContent = `Câu ${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('question-text').textContent = qData.question;
            
            const feedbackBox = document.getElementById('feedback-text');
            const optionsContainer = document.getElementById('options-container');
            
            optionsContainer.innerHTML = '';
            feedbackBox.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D'];

            // Lấy lại danh sách đáp án đã trộn từ trước để khi Quay lại không bị đổi vị trí
            state.shuffledOptions.forEach((optObj, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 border-2 border-gray-200 rounded-lg bg-gray-50 text-gray-800 font-medium hover:bg-blue-50 focus:outline-none";
                btn.innerHTML = `<span class="font-bold text-blue-600 mr-2">${letters[index]}.</span> ${optObj.text}`;
                
                // Khôi phục trạng thái nếu câu này đã làm
                // Thay thế đoạn khôi phục trạng thái cũ bằng đoạn này:
            
                // 1. LUÔN BÔI ĐỎ CÁC ĐÁP ÁN ĐÃ TỪNG BẤM SAI (Nếu có)
                if (state.clickedWrongIdxs.includes(optObj.originalIndex)) {
                    btn.classList.add('wrong');
                    btn.disabled = true;
                }

                // 2. KHÓA TẤT CẢ VÀ BÔI XANH ĐÁP ÁN ĐÚNG NẾU CÂU ĐÃ ĐƯỢC VƯỢT QUA
                if (state.passed) {
                    btn.disabled = true; // Khóa toàn bộ nút
                    if (optObj.originalIndex === qData.correctIndex) {
                        btn.classList.add('correct'); // Bôi xanh đáp án đúng
                        feedbackBox.innerHTML = "<span class='text-green-600 font-bold'>✅ Em đã hoàn thành câu này.</span>";
                    }
                }

                btn.onclick = () => checkAnswer(btn, optObj.originalIndex, qData.correctIndex, qData.id, optObj.text);
                optionsContainer.appendChild(btn);
            });

            updateNavigationButtons(state.passed);
        }

        function checkAnswer(btn, selectedIdx, correctIdx, qId, optionText) {
            // Ngăn việc click đúp hoặc click các nút đang bị khóa
            if (btn.disabled) return;

            // Lấy dữ liệu thống kê từ LocalStorage
            let stats = JSON.parse(localStorage.getItem('excelStats_THCS')) || {};
            if (!stats[qId]) stats[qId] = { attempts: 0, wrongFirstTry: 0 };
            
            // Lấy trạng thái và dữ liệu của câu hỏi hiện tại
            const state = questionStates[currentQuestionIndex];
            const feedbackBox = document.getElementById('feedback-text');
            const qData = questions[currentQuestionIndex]; 

            // 1. NẾU CHỌN ĐÚNG
            if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                state.passed = true;
                feedbackBox.innerHTML = "<span class='text-green-600 font-bold'>✅ Chính xác! Nhấn nút 'Câu tiếp' để đi tiếp.</span>";

                // Vô hiệu hóa tất cả các nút ngay lập tức
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

                // Tính điểm nếu đây là lần chạm đầu tiên
                if (!state.wrongFirstTry) {
                    scoreCount++;
                    stats[qId].attempts++;
                    localStorage.setItem('excelStats_THCS', JSON.stringify(stats));
                }
                
                // Cập nhật hiển thị nút điều hướng
                updateNavigationButtons(true);
            } 
            // 2. NẾU CHỌN SAI
            else {
                btn.classList.add('wrong');
                btn.disabled = true; // Khóa đáp án sai này lại
                state.clickedWrongIdxs.push(selectedIdx); // Lưu vết nút sai đã bấm
                feedbackBox.innerHTML = "<span class='text-red-600 font-bold animate-pulse'>❌ Chưa chính xác, em hãy chọn lại!</span>";

                // Ghi nhận lịch sử sai ngay lần chạm đầu
                if (!state.wrongFirstTry) {
                    state.wrongFirstTry = true;
                    stats[qId].attempts++;
                    stats[qId].wrongFirstTry++;
                    localStorage.setItem('excelStats_THCS', JSON.stringify(stats));
                    
                    // LƯU ID CÂU HỎI, ĐÁP ÁN SAI VÀ ĐÁP ÁN ĐÚNG LÊN GOOGLE SHEETS
                    let correctText = qData.options[qData.correctIndex];
                    userMistakes.push(`[ID: ${qId} | Sai: ${optionText} | Đúng: ${correctText}]`);
                }
            }
        }

        // --- XỬ LÝ NÚT ĐIỀU HƯỚNG ---
        function updateNavigationButtons(isCurrentPassed) {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            // Xử lý nút Câu trước
            if (currentQuestionIndex > 0) prevBtn.classList.remove('invisible');
            else prevBtn.classList.add('invisible');

            // Xử lý nút Câu tiếp
            if (isCurrentPassed) {
                nextBtn.classList.remove('invisible');
                if (currentQuestionIndex === questions.length - 1) {
                    nextBtn.textContent = "Nộp bài 🏁";
                    nextBtn.classList.replace('bg-blue-500', 'bg-green-600');
                    nextBtn.classList.replace('hover:bg-blue-600', 'hover:bg-green-700');
                } else {
                    nextBtn.textContent = "Câu tiếp ➡️";
                    nextBtn.classList.replace('bg-green-600', 'bg-blue-500');
                    nextBtn.classList.replace('hover:bg-green-700', 'hover:bg-blue-600');
                }
            } else {
                nextBtn.classList.add('invisible');
            }
        }

        function goPrev() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function goNext() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                finishQuiz("Hoàn thành bài thi!");
            }
        }

        function finishQuiz(msgTitle) {
            clearInterval(timerInterval);
            quizScreen.classList.remove('flex'); quizScreen.classList.add('hidden-screen');
            resultScreen.classList.remove('hidden-screen');

            document.getElementById('finish-title').textContent = msgTitle;
            const finalScoreVal = (scoreCount / questions.length) * 10;
            const finalScoreFixed = finalScoreVal.toFixed(1);

            document.getElementById('score-display').textContent = finalScoreFixed;
            document.getElementById('correct-count').textContent = `Đúng ngay lần đầu: ${scoreCount}/${questions.length}`;

            const feedback = document.getElementById('feedback-message');
            if (finalScoreVal >= 8) { feedback.textContent = "Xuất sắc! Em nắm kiến thức rất tốt."; feedback.className = "text-green-600 font-bold text-lg mb-8"; } 
            else if (finalScoreVal >= 5) { feedback.textContent = "Khá tốt! Hãy xem lại những câu làm sai nhé."; feedback.className = "text-blue-600 font-bold text-lg mb-8"; } 
            else { feedback.textContent = "Đừng nản, làm lại sẽ nhớ ngay!"; feedback.className = "text-red-500 font-bold text-lg mb-8"; }

            sendToGoogleSheet(finalScoreFixed);
        }

        function sendToGoogleSheet(score) {
            const statusText = document.getElementById('save-status');
            const details = userMistakes.length > 0 ? userMistakes.join(" || ") : "Đúng 100% lần đầu";
            
            const formData = new URLSearchParams();
            formData.append("sheetName", CONFIG.sheetName);
            formData.append("topic", CONFIG.topic);
            formData.append("userClass", "'" + studentClass); 
            formData.append("stt", studentId);
            formData.append("name", studentName);
            formData.append("score", score);
            formData.append("totalQuestions", questions.length);
            formData.append("questionIds", details);

            fetch(CONFIG.googleSheetURL, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: formData.toString() })
            .then(response => response.text())
            .then(responseText => {
                if (responseText.includes("OK") || responseText.includes("Success")) {
                    statusText.innerText = "✅ Kết quả đã được lưu vào hệ thống.";
                    statusText.classList.replace("bg-gray-200", "bg-green-100");
                    statusText.classList.replace("text-gray-500", "text-green-700");
                } else statusText.innerText = "Đã gửi dữ liệu.";
            })
            .catch(err => {
                statusText.innerText = "❌ Lỗi mạng: Không thể gửi kết quả.";
                statusText.classList.replace("bg-gray-200", "bg-red-100");
                statusText.classList.replace("text-gray-500", "text-red-700");
            });
        }
    </script>
</body>
</html>
