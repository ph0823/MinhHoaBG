<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word → JSON (Underline Correct Answer)</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
button { padding: 8px 15px; margin-top: 10px; }
pre { background: #f4f4f4; padding: 10px; max-height: 400px; overflow: auto; }
</style>
</head>

<body>
<h2>Word → JSON (Underline Correct Answer) v1</h2>
<h2>Upload file Word (.docx)</h2>
<input type="file" id="fileInput" accept=".docx" />
<br>
<button onclick="convert()">Chuyển sang JSON</button>
<button onclick="downloadJSON()">Tải JSON</button>

<h3>Kết quả:</h3>
<pre id="output"></pre>

<script>
let finalData = [];

async function convert() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("Vui lòng chọn file");
        return;
    }

    const arrayBuffer = await file.arrayBuffer();

    const result = await mammoth.convertToHtml({ arrayBuffer });
    const html = result.value;

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    finalData = parseQuestions(doc);

    document.getElementById("output").textContent =
        JSON.stringify(finalData, null, 2);
}

function parseQuestions(doc) {

    const paragraphs = [...doc.querySelectorAll("p")];

    let questions = [];
    let current = null;
    let id = 1;

    paragraphs.forEach(p => {

        const text = p.innerText.trim();

        // ===== CÂU HỎI =====
        if (/^Câu\s+\d+/i.test(text)) {

            if (current) questions.push(current);

            current = {
                id: id++,
                question: text.replace(/^Câu\s+\d+:\s*/i, ""),
                options: [],
                correctIndex: -1
            };

            return;
        }

        if (!current) return;

        // ===== TÁCH ĐÁP ÁN THEO DOM CHUẨN =====
        const rawHTML = p.innerHTML;

        // Tách theo A. B. C. D.
        const parts = rawHTML.split(/(?=[A-D]\.\s)/g);

        parts.forEach(part => {

            const match = part.match(/^([A-D])\.\s*(.*)/s);
            if (!match) return;

            const letter = match[1];
            const htmlContent = match[2];

            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = htmlContent;

            const optionText = tempDiv.innerText.trim();

            const optionIndex = current.options.length;
            current.options.push(optionText);

            // ===== KIỂM TRA UNDERLINE CHÍNH XÁC =====
            const hasUnderline =
                tempDiv.querySelector("u") ||
                [...tempDiv.querySelectorAll("span")].some(span =>
                    (span.style && span.style.textDecoration.includes("underline"))
                );

            if (hasUnderline) {
                current.correctIndex = optionIndex;
            }

        });

    });

    if (current) questions.push(current);

    return questions;
}

function downloadJSON() {
    if (!finalData.length) {
        alert("Chưa có dữ liệu");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(finalData, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "questions.json";
    a.click();
}
</script>

</body>
</html>
