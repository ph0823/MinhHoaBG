<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Excel - THCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0fdf4; /* Xanh lá nhạt, dịu mắt cho học sinh */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hidden-screen { display: none; }
        .option-btn {
            transition: all 0.2s ease-in-out;
        }
        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .selected {
            background-color: #3b82f6 !important; /* Màu xanh dương khi chọn */
            color: white !important;
            border-color: #2563eb !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 select-none">

    <div class="bg-white max-w-2xl w-full rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <div id="login-screen" class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-green-600 mb-2">Trắc Nghiệm Tin Học</h1>
                <p class="text-gray-500">Excel - Làm quen với trang tính</p>
            </div>
            
            <form id="info-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Lớp:</label>
                    <select id="class-input" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                        <option value="" disabled selected>Chọn lớp...</option>
                        <option value="7.1">7.1</option>
                        <option value="7.2">7.2</option>
                        <option value="7.3">7.3</option>
                        <option value="7.4">7.4</option>
                        <option value="7.5">7.5</option>
                        <option value="7.6">7.6</option>
                        <option value="7.7">7.7</option>
                        <option value="7.8">7.8</option>
                        <option value="7.9">7.9</option>
                        <option value="7.10">7.10</option>
                        <option value="7.11">7.11</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Số thứ tự:</label>
                    <input type="number" id="id-input" required placeholder="VD: 15" min="1" max="60" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Họ và tên học sinh:</label>
                    <input type="text" id="name-input" required placeholder="Nhập họ và tên có dấu..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                </div>
                <button type="submit" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg mt-6 hover:bg-green-600 transition duration-200">
                    Bắt đầu làm bài
                </button>
            </form>
        </div>

        <div id="quiz-screen" class="hidden-screen flex-col h-full">
            <div class="bg-blue-50 p-4 border-b border-blue-100 flex justify-between items-center text-sm md:text-base">
                <div>
                    <span class="font-bold text-blue-800" id="display-name">Học sinh: ...</span>
                </div>
                <div class="text-gray-600">
                    <span id="display-class" class="mr-3">Lớp: ...</span>
                    <span id="display-id">STT: ...</span>
                </div>
            </div>

            <div class="p-6 md:p-8">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-xl font-bold text-gray-800" id="question-number">Câu 1/20</h2>
                </div>
                
                <p class="text-lg text-gray-700 mb-6 font-medium" id="question-text">
                    Nội dung câu hỏi sẽ hiển thị ở đây?
                </p>

                <div id="options-container" class="space-y-3">
                    </div>

                <div class="mt-8 flex justify-end">
                    <button id="next-btn" class="bg-blue-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition duration-200" disabled>
                        Câu tiếp theo ❯
                    </button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden-screen p-8 text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Hoàn thành!</h2>
            <div class="bg-gray-50 rounded-xl p-6 mb-6 inline-block">
                <p class="text-gray-600 mb-2" id="result-student-info">Học sinh: ...</p>
                <p class="text-5xl font-black text-green-500 mb-2" id="score-display">0.0</p>
                <p class="text-gray-500">Điểm (Thang 10)</p>
                <p class="mt-4 text-blue-600 font-semibold" id="correct-count">Số câu đúng: 0/0</p>
                <p id="save-status" class="text-xs text-gray-400 mt-2 italic">Đang lưu kết quả...</p>
            </div>
            <p class="text-gray-600 mb-8" id="feedback-message">Chúc mừng em đã hoàn thành xuất sắc!</p>
            <button onclick="location.reload()" class="bg-gray-200 text-gray-800 font-bold py-2 px-6 rounded-lg hover:bg-gray-300 transition duration-200">
                Làm lại
            </button>
        </div>

    </div>

    <script>
        
        // --- BẢO MẬT: CHẶN COPY VÀ CHUỘT PHẢI ---
        // 1. Chặn mở menu chuột phải
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. Chặn phím tắt Copy (Ctrl+C / Cmd+C)
        document.addEventListener('copy', function(e) {
            e.preventDefault();            
        });

        // 3. Chặn phím tắt Cut (Ctrl+X / Cmd+X)
        document.addEventListener('cut', function(e) {
            e.preventDefault();
        });
        // ----------------------------------------

        // --- CẤU HÌNH GOOGLE SHEET ---
        const CONFIG = {
            googleSheetURL: "https://script.google.com/macros/s/AKfycbyN-3m_Z_-3Z6yaj_FO1NhGAlICmheLfCG-_LfPWgKOLYHixbvvJzlH2KN9vy97Z7oc/exec",
            sheetName: "K7b6", // Tên Sheet cần lưu
            topic: "Trang tính Excel"
        };

        // Dữ liệu 30 câu hỏi
        const rawQuestions = [
            // HĐ 2.1: SỔ TÍNH, TRANG TÍNH VÀ CÁC THÀNH PHẦN CƠ BẢN
            { q: "Một tệp chương trình bảng tính Excel thường được gọi là gì?", options: ["Trang tính.", "Sổ tính (Workbook).", "Văn bản.", "Bài trình chiếu."], ans: "Sổ tính (Workbook)." },
            { q: "Tên mặc định của một sổ tính mới mở là gì?", options: ["Document1.", "Presentation1.", "Book1.", "Sheet1."], ans: "Book1." },
            { q: "Một sổ tính (Workbook) có thể chứa bao nhiêu trang tính (Sheet)?", options: ["Duy nhất 1.", "Tối đa 3.", "Nhiều trang tính.", "Không giới hạn nhưng không được quá 10."], ans: "Nhiều trang tính." },
            { q: "Các cột của trang tính được sắp xếp theo thứ tự nào?", options: ["Các số 1, 2, 3...", "Các chữ cái A, B, C....", "Các ký tự đặc biệt.", "Tên do người dùng đặt."], ans: "Các chữ cái A, B, C...." },
            { q: "Các hàng của trang tính được đánh thứ tự như thế nào?", options: ["Các số 1, 2, 3....", "Các chữ cái A, B, C...", "Các số La Mã.", "Theo bảng chữ cái tiếng Việt."], ans: "Các số 1, 2, 3...." },
            { q: "Địa chỉ của một ô tính được xác định bởi:", options: ["Tên hàng trước, tên cột sau.", "Chỉ cần tên cột.", "Tên cột ghép với tên hàng.", "Số thứ tự của ô đó trong bảng."], ans: "Tên cột ghép với tên hàng." },
            { q: "Ô nằm ở cột C và hàng 5 có địa chỉ là:", options: ["5C.", "C-5.", "C5.", "(C,5)."], ans: "C5." },
            { q: "Thành phần nào hiển thị địa chỉ của ô đang được chọn?", options: ["Thanh công thức.", "Hộp địa chỉ (Name Box).", "Thanh trạng thái.", "Thanh cuộn dọc."], ans: "Hộp địa chỉ (Name Box)." },
            { q: "Để thêm một trang tính mới vào sổ tính, em nháy chuột vào dấu nào?", options: ["Dấu “x”.", "Dấu “-”.", "Dấu “+”.", "Dấu mũi tên."], ans: "Dấu “+”." },
            { q: "Tên trang tính (Sheet1, Sheet2...) nằm ở vị trí nào trên màn hình?", options: ["Phía trên cùng.", "Cạnh dưới bên trái màn hình (Thanh điều hướng).", "Bên phải thanh công thức.", "Trong dải lệnh Home."], ans: "Cạnh dưới bên trái màn hình (Thanh điều hướng)." },

            // HĐ 2.2: THAO TÁC VỚI HÀNG VÀ CỘT
            { q: "Để chọn (bôi đen) toàn bộ một cột, em nháy chuột vào vị trí nào?", options: ["Một ô bất kỳ trong cột.", "Tên hàng của hàng đầu tiên.", "Tên cột (chữ cái đầu cột).", "Thanh trạng thái."], ans: "Tên cột (chữ cái đầu cột)." },
            { q: "Để thay đổi độ rộng của cột, em đưa con trỏ chuột vào đâu?", options: ["Giữa trang tính.", "Vạch phân chia giữa hai tên cột.", "Hộp địa chỉ.", "Thanh cuộn ngang."], ans: "Vạch phân chia giữa hai tên cột." },
            { q: "Khi thực hiện lệnh chèn thêm hàng (Insert), hàng mới sẽ xuất hiện ở đâu?", options: ["Phía trên hàng đang chọn.", "Phía dưới hàng đang chọn.", "Ở cuối cùng của bảng tính.", "Ở hàng đầu tiên."], ans: "Phía trên hàng đang chọn." },
            { q: "Lệnh Insert và Delete dùng để chèn hoặc xóa hàng/cột nằm trong nhóm lệnh nào?", options: ["Font.", "Alignment.", "Cells.", "Editing."], ans: "Cells." },
            { q: "Để chọn nhiều hàng liền kề nhau, em thực hiện:", options: ["Nháy chuột vào từng hàng một.", "Nhấn giữ phím Ctrl và chọn.", "Nháy chọn hàng đầu, nhấn giữ Shift và chọn hàng cuối.", "Cả B và C đều đúng."], ans: "Nháy chọn hàng đầu, nhấn giữ Shift và chọn hàng cuối." },
            { q: "Nếu muốn xóa hoàn toàn một cột ra khỏi trang tính, em chọn lệnh nào?", options: ["Nhấn phím Delete trên bàn phím.", "Nhấn phím Backspace.", "Chọn cột, nháy chuột phải chọn Delete.", "Chọn cột, vào dải lệnh Home chọn Clear."], ans: "Chọn cột, nháy chuột phải chọn Delete." },
            { q: "Thao tác \"nháy đúp chuột vào vạch phân cách tên cột\" có tác dụng gì?", options: ["Xóa cột đó.", "Ẩn cột đó.", "Tự động điều chỉnh độ rộng cột vừa khít với dữ liệu.", "Chèn thêm một cột mới."], ans: "Tự động điều chỉnh độ rộng cột vừa khít với dữ liệu." },
            { q: "Để chọn toàn bộ trang tính, em nháy chuột vào:", options: ["Ô A1.", "Nút giao giữa tên hàng và tên cột (góc trên bên trái bảng).", "Tên trang tính.", "Thanh trạng thái."], ans: "Nút giao giữa tên hàng và tên cột (góc trên bên trái bảng)." },
            { q: "Có thể thay đổi độ cao của nhiều hàng cùng một lúc không?", options: ["Không, phải làm từng hàng.", "Có, bằng cách chọn các hàng đó rồi kéo thả vạch phân cách tên hàng.", "Chỉ thực hiện được nếu các hàng đó trống.", "Chỉ thực hiện được bằng lệnh Format."], ans: "Có, bằng cách chọn các hàng đó rồi kéo thả vạch phân cách tên hàng." },
            { q: "Lệnh nào dùng để đổi tên một trang tính?", options: ["Nháy đúp chuột vào tên trang tính (Sheet1...) và gõ tên mới.", "Nháy chuột vào ô A1.", "Nháy vào File -> Save As.", "Không thể đổi tên trang tính."], ans: "Nháy đúp chuột vào tên trang tính (Sheet1...) và gõ tên mới." },

            // HĐ 2.3: NHẬP, SỬA VÀ XÓA DỮ LIỆU
            { q: "Dữ liệu kiểu văn bản (chữ) mặc định sẽ được căn lề nào trong ô?", options: ["Căn giữa.", "Căn biên phải.", "Căn biên trái.", "Căn đều hai bên."], ans: "Căn biên trái." },
            { q: "Dữ liệu kiểu số mặc định sẽ được trang tính căn lề nào?", options: ["Căn biên trái.", "Căn biên phải.", "Căn giữa.", "Tùy theo độ lớn của số."], ans: "Căn biên phải." },
            { q: "Sau khi gõ dữ liệu vào một ô, phím nào giúp em kết thúc việc nhập và di chuyển xuống ô dưới?", options: ["Phím Tab.", "Phím Enter.", "Phím Space.", "Phím Esc."], ans: "Phím Enter." },
            { q: "Để di chuyển sang ô bên phải sau khi nhập dữ liệu, em sử dụng phím nào?", options: ["Enter.", "Backspace.", "Tab.", "Shift."], ans: "Tab." },
            { q: "Phím tắt nào dùng để đưa ô tính vào chế độ sửa dữ liệu (con trỏ xuất hiện trong ô)?", options: ["F1.", "F2.", "F4.", "F5."], ans: "F2." },
            { q: "Nếu muốn sửa một phần nội dung trong ô mà không muốn gõ lại toàn bộ, em thực hiện:", options: ["Nháy chuột 1 lần vào ô.", "Nháy đúp chuột vào ô tính.", "Nhấn phím Delete rồi gõ lại.", "Nháy chuột vào tên cột."], ans: "Nháy đúp chuột vào ô tính." },
            { q: "Để xóa nội dung trong một hoặc nhiều ô đang chọn, em sử dụng phím:", options: ["Delete.", "Alt.", "Ctrl.", "Caps Lock."], ans: "Delete." },
            { q: "Khi em chọn một ô và gõ nội dung mới, nội dung cũ trong ô đó sẽ như thế nào?", options: ["Được đẩy sang ô bên cạnh.", "Vẫn giữ nguyên, nội dung mới nối tiếp vào.", "Bị xóa đi và thay thế bằng nội dung mới.", "Excel sẽ báo lỗi."], ans: "Bị xóa đi và thay thế bằng nội dung mới." },
            { q: "Em có thể quan sát và sửa nội dung của ô tính ở đâu ngoài việc thao tác trực tiếp tại ô?", options: ["Hộp địa chỉ.", "Thanh công thức.", "Thanh trạng thái.", "Dải lệnh Design."], ans: "Thanh công thức." },
            { q: "Cách nào sau đây giúp em nhập dữ liệu nhanh cho các ô liền kề có cùng nội dung?", options: ["Gõ từng ô một.", "Sử dụng thao tác Copy và Paste.", "Sử dụng tính năng kéo thả nút điền (ô vuông nhỏ ở góc dưới bên phải ô đang chọn).", "Cả B và C đều đúng."], ans: "Cả B và C đều đúng." }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let scoreCount = 0;
        let selectedAnswer = null;
        let userAnswers = []; // Mảng lưu lịch sử trả lời của học sinh

        // Biến toàn cục lưu thông tin học sinh
        let studentClass = "";
        let studentId = "";
        let studentName = "";

        // Các thành phần DOM
        const loginScreen = document.getElementById('login-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const infoForm = document.getElementById('info-form');
        const nextBtn = document.getElementById('next-btn');

        // Hàm xáo trộn mảng (Fisher-Yates)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // Xử lý khi Submit Form nhập thông tin
        infoForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Lấy thông tin
            studentClass = document.getElementById('class-input').value;
            studentId = document.getElementById('id-input').value;
            studentName = document.getElementById('name-input').value;

            if(!studentClass) {
                alert("Vui lòng chọn lớp!");
                return;
            }

            // Hiển thị lên Header màn hình làm bài
            document.getElementById('display-name').textContent = `Học sinh: ${studentName}`;
            document.getElementById('display-class').textContent = `Lớp: ${studentClass}`;
            document.getElementById('display-id').textContent = `STT: ${studentId}`;
            document.getElementById('result-student-info').textContent = `${studentName} - Lớp ${studentClass} - STT ${studentId}`;

            // Chuẩn bị câu hỏi: Xáo trộn mảng câu hỏi gốc và lấy 20 câu đầu tiên
            questions = shuffleArray([...rawQuestions]).slice(0, 20);;
            userAnswers = []; // Reset câu trả lời
            scoreCount = 0;

            // Chuyển màn hình
            loginScreen.classList.add('hidden-screen');
            quizScreen.classList.remove('hidden-screen');
            quizScreen.classList.add('flex');

            loadQuestion();
        });

        // Tải câu hỏi hiện tại
        function loadQuestion() {
            selectedAnswer = null;
            nextBtn.disabled = true;
            nextBtn.textContent = (currentQuestionIndex === questions.length - 1) ? "Nộp bài ❯" : "Câu tiếp theo ❯";

            const qData = questions[currentQuestionIndex];
            
            document.getElementById('question-number').textContent = `Câu ${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('question-text').textContent = qData.q;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Xáo trộn thứ tự đáp án (A,B,C,D) để học sinh không học vẹt
            const shuffledOptions = shuffleArray([...qData.options]);

            // Tạo các nút đáp án
            shuffledOptions.forEach((optionText, index) => {
                const btn = document.createElement('button');
                // Gán chữ A, B, C, D động dựa vào index
                const letters = ['A', 'B', 'C', 'D'];
                
                btn.className = "option-btn w-full text-left p-4 border-2 border-gray-200 rounded-lg bg-gray-50 text-gray-700 font-medium hover:bg-blue-50 hover:border-blue-200";
                btn.innerHTML = `<span class="font-bold mr-2">${letters[index]}.</span> ${optionText}`;
                
                btn.onclick = () => selectOption(btn, optionText);
                optionsContainer.appendChild(btn);
            });
        }

        // Xử lý khi học sinh click chọn 1 đáp án
        function selectOption(clickedBtn, optionText) {
            // Xóa trạng thái selected của các nút khác
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('selected');
                btn.classList.add('bg-gray-50', 'text-gray-700', 'border-gray-200');
            });

            // Thêm trạng thái selected cho nút vừa click
            clickedBtn.classList.add('selected');
            clickedBtn.classList.remove('bg-gray-50', 'text-gray-700', 'border-gray-200');

            selectedAnswer = optionText;
            nextBtn.disabled = false; // Bật nút đi tiếp
        }

        // Xử lý khi bấm nút "Câu tiếp theo / Nộp bài"
        nextBtn.addEventListener('click', () => {
            const currentQ = questions[currentQuestionIndex];
            const isCorrect = (selectedAnswer === currentQ.ans);

            // 1. Lưu kết quả câu trả lời
            userAnswers.push({
                questionId: currentQuestionIndex + 1,
                userChoice: selectedAnswer,
                correctChoice: currentQ.ans,
                isCorrect: isCorrect
            });

            // 2. Tính điểm
            if (isCorrect) {
                scoreCount++;
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                finishQuiz();
            }
        });

        // Kết thúc bài và tính điểm
        function finishQuiz() {
            quizScreen.classList.remove('flex');
            quizScreen.classList.add('hidden-screen');
            resultScreen.classList.remove('hidden-screen');

            // Tính điểm thang 10: (Số câu đúng / Tổng câu) * 10
            const maxScore = 10;
            const finalScoreVal = (scoreCount / questions.length) * maxScore;
            const finalScoreFixed = finalScoreVal.toFixed(2); // Dùng 2 số thập phân

            // Hiển thị kết quả
            document.getElementById('score-display').textContent = finalScoreFixed;
            document.getElementById('correct-count').textContent = `Số câu đúng: ${scoreCount}/${questions.length}`;

            const feedback = document.getElementById('feedback-message');
            if (finalScoreVal >= 8) {
                feedback.textContent = "Xuất sắc! Em nắm kiến thức Excel rất vững.";
                feedback.className = "text-green-600 font-medium mb-8";
            } else if (finalScoreVal >= 5) {
                feedback.textContent = "Khá tốt! Em cố gắng ôn tập thêm một chút nữa nhé.";
                feedback.className = "text-blue-600 font-medium mb-8";
            } else {
                feedback.textContent = "Em cần xem lại bài giảng Excel nhiều hơn nhé. Cố lên!";
                feedback.className = "text-red-500 font-medium mb-8";
            }

            // --- GỬI DỮ LIỆU LÊN GOOGLE SHEET ---
            sendToGoogleSheet(finalScoreFixed);
        }

        function sendToGoogleSheet(score) {
            const statusText = document.getElementById('save-status');
            
            // 1. Tạo chuỗi chi tiết lỗi sai
            // Format: Câu 1(Sai: A | Đúng: B) || Câu 2...
            let analysisResult = [];
            userAnswers.forEach((ans, idx) => {
                if (!ans.isCorrect) {
                    analysisResult.push(`Câu ${idx + 1}(Sai: ${ans.userChoice} | Đúng: ${ans.correctChoice})`);
                }
            });

            const details = analysisResult.length > 0 ? analysisResult.join(" || ") : "Hoàn thành xuất sắc";

            // 2. Chuẩn bị FormData
            const formData = new URLSearchParams();
            formData.append("sheetName", CONFIG.sheetName);
            formData.append("topic", CONFIG.topic);
            formData.append("userClass", "'" + studentClass); // Thêm dấu ' để Excel không tự format ngày tháng
            formData.append("stt", studentId);
            formData.append("name", studentName);
            formData.append("score", score);
            formData.append("totalQuestions", questions.length);
            formData.append("questionIds", details);

            // 3. Gửi Fetch
            fetch(CONFIG.googleSheetURL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData.toString()
            })
            .then(response => response.text())
            .then(responseText => {
                if (responseText.includes("OK") || responseText.includes("Success")) {
                    console.log("✅ Đã lưu kết quả thành công!");
                    statusText.innerText = "✅ Kết quả đã được lưu vào hệ thống.";
                    statusText.classList.replace("text-gray-400", "text-green-600");
                } else {
                    console.log("⚠️ Phản hồi server: " + responseText);
                    statusText.innerText = "Đã gửi dữ liệu.";
                }
            })
            .catch(err => {
                console.error("❌ Lỗi mạng:", err);
                statusText.innerText = "❌ Không thể lưu kết quả (Lỗi mạng).";
                statusText.classList.replace("text-gray-400", "text-red-500");
            });
        }
    </script>
