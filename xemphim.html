<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Phim</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent-color); margin-bottom: 20px; }
        .section-title { margin: 40px 0 20px 0; border-left: 4px solid var(--accent-color); padding-left: 15px; text-transform: uppercase; }

        .search-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        #search-input { padding: 10px 15px; width: 300px; border-radius: 5px; border: 1px solid var(--accent-color); background: #1e293b; color: white; }
        .search-btn { padding: 10px 20px; background: var(--accent-color); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; }
        .movie-info h3 { font-size: 0.85rem; margin: 5px 0; height: 2.5em; overflow: hidden; }

        /* Pagination Styling */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }
        .page-btn {
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { font-size: 0.9rem; font-weight: bold; }

        #player-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #player-container { width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { margin-top: 20px; padding: 10px 25px; background: var(--accent-color); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        #loading { text-align: center; font-size: 1.2rem; margin: 20px; }
    </style>
</head>
<body>

<header>
    <h1>🎬 THẾ GIỚI PHIM TRỰC TUYẾN</h1>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Tìm tên phim hoặc diễn viên..." value="Thành Long">
        <button class="search-btn" onclick="initSearch()">TÌM KIẾM</button>
    </div>
</header>

<div id="loading" style="display:none;">Đang tải dữ liệu...</div>

<div id="default-content">
    <h2 class="section-title">📺 Phim Bộ Hàn Quốc</h2>
    <div id="korea-series-grid" class="movie-grid"></div>
    <div class="pagination">
        <button id="korea-prev" class="page-btn" onclick="changeDefaultPage('korea', -1)">Trang trước</button>
        <span id="korea-page-info" class="page-info">Trang 1</span>
        <button id="korea-next" class="page-btn" onclick="changeDefaultPage('korea', 1)">Trang sau</button>
    </div>

    <h2 class="section-title">⚔️ Phim Lẻ Hành Động</h2>
    <div id="action-movies-grid" class="movie-grid"></div>
    <div class="pagination">
        <button id="action-prev" class="page-btn" onclick="changeDefaultPage('action', -1)">Trang trước</button>
        <span id="action-page-info" class="page-info">Trang 1</span>
        <button id="action-next" class="page-btn" onclick="changeDefaultPage('action', 1)">Trang sau</button>
    </div>
</div>

<div id="search-results" style="display:none;">
    <h2 class="section-title">🔍 Kết quả tìm kiếm</h2>
    <div id="search-grid" class="movie-grid"></div>
    <div class="pagination">
        <button id="search-prev" class="page-btn" onclick="changeSearchPage(-1)">Trang trước</button>
        <span id="search-page-info" class="page-info">Trang 1</span>
        <button id="search-next" class="page-btn" onclick="changeSearchPage(1)">Trang sau</button>
    </div>
    <button class="close-btn" style="display:block; margin: 20px auto;" onclick="backToHome()">QUAY LẠI TRANG CHỦ</button>
</div>

<div id="player-modal">
    <div id="player-container">
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>
    <button class="close-btn" onclick="closePlayer()">ĐÓNG</button>
</div>

<script>
    const API_SEARCH = "https://phimapi.com/v1/api/tim-kiem?keyword=";
    const API_LIST = "https://phimapi.com/v1/api/danh-sach/";
    const API_DETAIL = "https://phimapi.com/phim/";
    const IMG_DOMAIN = "https://phimimg.com/";

    // Quản lý trang cho từng danh mục
    let pages = {
        korea: 1,
        action: 1,
        search: 1
    };

    let totalPages = {
        korea: 1,
        action: 1,
        search: 1
    };

    let currentSearchKeyword = "";

    // 1. Tải danh sách mặc định
    async function loadDefaultLists() {
        document.getElementById('loading').style.display = 'block';
        await Promise.all([
            fetchAndDisplay(`${API_LIST}phim-bo?country=han-quoc&page=${pages.korea}`, 'korea-series-grid', 'korea'),
            fetchAndDisplay(`${API_LIST}phim-le?category=hanh-dong&page=${pages.action}`, 'action-movies-grid', 'action')
        ]);
        document.getElementById('loading').style.display = 'none';
    }

    async function fetchAndDisplay(url, gridId, type) {
        try {
            const response = await fetch(url);
            const result = await response.json();
            const movies = result.data.items;
            const pagination = result.data.params.pagination;
            
            totalPages[type] = Math.ceil(pagination.totalItems / pagination.totalItemsPerPage);
            displayMovies(movies, gridId);
            updatePaginationUI(type);
        } catch (error) {
            console.error(`Lỗi tải danh sách ${type}:`, error);
        }
    }

    function updatePaginationUI(type) {
        document.getElementById(`${type}-page-info`).innerText = `Trang ${pages[type]} / ${totalPages[type]}`;
        document.getElementById(`${type}-prev`).disabled = (pages[type] <= 1);
        document.getElementById(`${type}-next`).disabled = (pages[type] >= totalPages[type]);
    }

    async function changeDefaultPage(type, step) {
        pages[type] += step;
        const url = type === 'korea' 
            ? `${API_LIST}phim-bo?country=han-quoc&page=${pages.korea}`
            : `${API_LIST}phim-le?category=hanh-dong&page=${pages.action}`;
        
        await fetchAndDisplay(url, type === 'korea' ? 'korea-series-grid' : 'action-movies-grid', type);
        // Cuộn nhẹ đến phần tiêu đề của danh mục đó
        document.getElementById(type === 'korea' ? 'korea-series-grid' : 'action-movies-grid').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 2. Xử lý tìm kiếm
    function initSearch() {
        currentSearchKeyword = document.getElementById('search-input').value;
        pages.search = 1;
        executeSearch();
    }

    async function executeSearch() {
        if (!currentSearchKeyword) return;
        document.getElementById('default-content').style.display = 'none';
        document.getElementById('search-results').style.display = 'block';
        document.getElementById('loading').style.display = 'block';

        const url = `${API_SEARCH}${encodeURIComponent(currentSearchKeyword)}&page=${pages.search}`;
        await fetchAndDisplay(url, 'search-grid', 'search');
        document.getElementById('loading').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function changeSearchPage(step) {
        pages.search += step;
        executeSearch();
    }

    function backToHome() {
        document.getElementById('default-content').style.display = 'block';
        document.getElementById('search-results').style.display = 'none';
    }

    // 3. Hiển thị & Trình phát
    function displayMovies(movies, gridId) {
        const grid = document.getElementById(gridId);
        if (!movies || movies.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Không có dữ liệu.</p>";
            return;
        }
        grid.innerHTML = movies.map(movie => {
            const imageUrl = movie.thumb_url.startsWith('http') ? movie.thumb_url : `${IMG_DOMAIN}${movie.thumb_url}`;
            return `
                <div class="movie-card" onclick="playMovie('${movie.slug}')">
                    <img src="${imageUrl}" alt="${movie.name}" onerror="this.src='https://placehold.co/200x300?text=No+Image'">
                    <div class="movie-info">
                        <h3>${movie.name}</h3>
                        <small>${movie.year}</small>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function playMovie(slug) {
        try {
            const response = await fetch(API_DETAIL + slug);
            const data = await response.json();
            document.getElementById('video-iframe').src = data.episodes[0].server_data[0].link_embed;
            document.getElementById('player-modal').style.display = 'flex';
        } catch (error) { alert("Lỗi link phim!"); }
    }

    function closePlayer() {
        document.getElementById('video-iframe').src = "";
        document.getElementById('player-modal').style.display = 'none';
    }

    window.onload = loadDefaultLists;
</script>
</body>
</html>
