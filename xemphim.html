<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Phim</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent-color); margin-bottom: 20px; }
        .section-title { margin: 40px 0 20px 0; border-left: 4px solid var(--accent-color); padding-left: 15px; text-transform: uppercase; }

        .search-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        #search-input { padding: 10px 15px; width: 300px; border-radius: 5px; border: 1px solid var(--accent-color); background: #1e293b; color: white; }
        .search-btn { padding: 10px 20px; background: var(--accent-color); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: transform 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; }
        .movie-info h3 { font-size: 0.85rem; margin: 5px 0; height: 2.5em; overflow: hidden; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; }
        .page-btn { padding: 6px 12px; background: var(--card-bg); border: 1px solid var(--accent-color); color: var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #player-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000; flex-direction: column;
            align-items: center; overflow-y: auto; padding: 20px 0;
        }

        #player-container { width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .episode-container { width: 90%; max-width: 900px; margin-top: 20px; background: var(--card-bg); padding: 20px; border-radius: 8px; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 15px; }
        .episode-btn { padding: 8px; background: #334155; border: 1px solid #475569; color: white; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
        .episode-btn:hover, .episode-btn.active { background: var(--accent-color); color: black; }

        .close-btn { margin-top: 20px; padding: 10px 25px; background: #ef4444; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #loading { text-align: center; font-size: 1.2rem; margin: 20px; }
    </style>
</head>
<body>

<header>
    <h1>🎬 THẾ GIỚI PHIM ĐA QUỐC GIA</h1>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Tìm tên phim hoặc diễn viên..." value="Thành Long">
        <button class="search-btn" onclick="initSearch()">TÌM KIẾM</button>
    </div>
</header>

<div id="loading" style="display:none;">Đang tải dữ liệu...</div>

<div id="default-content">
    <h2 class="section-title">🇭🇰 Phim Hồng Kông</h2>
    <div id="hongkong-grid" class="movie-grid"></div>
    <div class="pagination"><button id="hongkong-prev" class="page-btn" onclick="changePage('hongkong', -1)">Trước</button><span id="hongkong-info"></span><button id="hongkong-next" class="page-btn" onclick="changePage('hongkong', 1)">Sau</button></div>

    <h2 class="section-title">🇺🇸 Phim Mỹ</h2>
    <div id="usa-grid" class="movie-grid"></div>
    <div class="pagination"><button id="usa-prev" class="page-btn" onclick="changePage('usa', -1)">Trước</button><span id="usa-info"></span><button id="usa-next" class="page-btn" onclick="changePage('usa', 1)">Sau</button></div>

    <h2 class="section-title">🇯🇵 Phim Nhật Bản</h2>
    <div id="japan-grid" class="movie-grid"></div>
    <div class="pagination"><button id="japan-prev" class="page-btn" onclick="changePage('japan', -1)">Trước</button><span id="japan-info"></span><button id="japan-next" class="page-btn" onclick="changePage('japan', 1)">Sau</button></div>

    <h2 class="section-title">🇫🇷 Phim Pháp</h2>
    <div id="france-grid" class="movie-grid"></div>
    <div class="pagination"><button id="france-prev" class="page-btn" onclick="changePage('france', -1)">Trước</button><span id="france-info"></span><button id="france-next" class="page-btn" onclick="changePage('france', 1)">Sau</button></div>

    <h2 class="section-title">🇵🇭 Phim Philippines</h2>
    <div id="phil-grid" class="movie-grid"></div>
    <div class="pagination"><button id="phil-prev" class="page-btn" onclick="changePage('phil', -1)">Trước</button><span id="phil-info"></span><button id="phil-next" class="page-btn" onclick="changePage('phil', 1)">Sau</button></div>
</div>

<div id="search-results" style="display:none;">
    <h2 class="section-title">🔍 Kết quả tìm kiếm</h2>
    <div id="search-grid" class="movie-grid"></div>
    <div class="pagination"><button id="search-prev" class="page-btn" onclick="changeSearchPage(-1)">Trước</button><span id="search-info"></span><button id="search-next" class="page-btn" onclick="changeSearchPage(1)">Sau</button></div>
    <button class="close-btn" style="display:block; margin: 20px auto; background: var(--accent-color); color: black;" onclick="backToHome()">QUAY LẠI TRANG CHỦ</button>
</div>

<div id="player-modal">
    <div id="player-container"><iframe id="video-iframe" src="" allowfullscreen></iframe></div>
    <div class="episode-container">
        <h3 id="movie-title-display" style="color: var(--accent-color);"></h3>
        <p id="movie-desc" style="font-size: 0.85rem; color: #cbd5e1;"></p>
        <hr style="border: 0.5px solid #475569;">
        <strong>DANH SÁCH TẬP:</strong>
        <div id="episode-list" class="episode-list"></div>
    </div>
    <button class="close-btn" onclick="closePlayer()">ĐÓNG</button>
</div>

<script>
    const API_SEARCH = "https://phimapi.com/v1/api/tim-kiem?keyword=";
    const API_LIST = "https://phimapi.com/v1/api/danh-sach/phim-moi?country=";
    const API_DETAIL = "https://phimapi.com/phim/";
    const IMG_DOMAIN = "https://phimimg.com/";

    let pages = { hongkong: 1, usa: 1, japan: 1, france: 1, phil: 1, search: 1 };
    let total = { hongkong: 1, usa: 1, japan: 1, france: 1, phil: 1, search: 1 };
    let currentKeyword = "";

    const countrySlugs = {
        hongkong: 'hong-kong',
        usa: 'my',
        japan: 'nhat-ban',
        france: 'phap',
        phil: 'philippines'
    };

    async function loadHome() {
        document.getElementById('loading').style.display = 'block';
        const tasks = Object.keys(countrySlugs).map(key => 
            fetchData(`${API_LIST}${countrySlugs[key]}&page=${pages[key]}`, key)
        );
        await Promise.all(tasks);
        document.getElementById('loading').style.display = 'none';
    }

    async function fetchData(url, type) {
        try {
            const res = await fetch(url);
            const json = await res.json();
            const pagination = json.data.params.pagination;
            total[type] = Math.ceil(pagination.totalItems / pagination.totalItemsPerPage);
            renderMovies(json.data.items, `${type}-grid`);
            
            document.getElementById(`${type}-info`).innerText = `Trang ${pages[type]} / ${total[type]}`;
            document.getElementById(`${type}-prev`).disabled = pages[type] <= 1;
            document.getElementById(`${type}-next`).disabled = pages[type] >= total[type];
        } catch (e) { console.error(e); }
    }

    function renderMovies(movies, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = movies.map(m => {
            const img = m.thumb_url.startsWith('http') ? m.thumb_url : `${IMG_DOMAIN}${m.thumb_url}`;
            return `<div class="movie-card" onclick="playMovie('${m.slug}')">
                <img src="${img}" onerror="this.src='https://placehold.co/200x300?text=No+Image'">
                <div class="movie-info"><h3>${m.name}</h3><small>${m.year}</small></div>
            </div>`;
        }).join('');
    }

    function changePage(type, step) {
        pages[type] += step;
        fetchData(`${API_LIST}${countrySlugs[type]}&page=${pages[type]}`, type);
        document.getElementById(`${type}-grid`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function initSearch() {
        currentKeyword = document.getElementById('search-input').value;
        pages.search = 1;
        doSearch();
    }

    async function doSearch() {
        if (!currentKeyword) return;
        document.getElementById('default-content').style.display = 'none';
        document.getElementById('search-results').style.display = 'block';
        fetchData(`https://phimapi.com/v1/api/tim-kiem?keyword=${encodeURIComponent(currentKeyword)}&page=${pages.search}`, 'search');
    }

    function changeSearchPage(step) { pages.search += step; doSearch(); }
    function backToHome() { document.getElementById('default-content').style.display = 'block'; document.getElementById('search-results').style.display = 'none'; }

    async function playMovie(slug) {
        try {
            const res = await fetch(API_DETAIL + slug);
            const data = await res.json();
            const eps = data.episodes[0].server_data;
            document.getElementById('movie-title-display').innerText = data.movie.name;
            document.getElementById('movie-desc').innerText = data.movie.content.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...";
            document.getElementById('episode-list').innerHTML = eps.map((e, i) => 
                `<button class="episode-btn ${i===0?'active':''}" onclick="loadEp('${e.link_embed}', this)">${e.name}</button>`
            ).join('');
            loadEp(eps[0].link_embed, document.querySelector('.episode-btn'));
            document.getElementById('player-modal').style.display = 'flex';
        } catch (e) { alert("Lỗi tải phim!"); }
    }

    function loadEp(url, btn) {
        document.getElementById('video-iframe').src = url;
        document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function closePlayer() { document.getElementById('video-iframe').src = ""; document.getElementById('player-modal').style.display = 'none'; }

    window.onload = loadHome;
</script>
</body>
</html>
