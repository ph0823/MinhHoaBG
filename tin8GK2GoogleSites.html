        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-card:hover:not(.disabled) { transform: translateY(-2px); border-color: #3b82f6; background-color: #eff6ff; }

        .selected-exam .marker-circle { background-color: #3b82f6 !important; color: white !important; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .perfect-bg { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border: 4px solid #f59e0b; }
        .timer-warning { color: #ef4444; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .disabled { pointer-events: none; opacity: 0.6; }
    </style>

        let questions = [];
        let questionStates = []; 
        let currentQuestionIndex = 0;
        let scoreCount = 0; 
        let userMistakes = []; 
        
        let userName = "", userClass = "", userStt = "";
        let timerInterval;
        let timeLeft;
        let isSubmitted = false;

        document.getElementById('sub-topic-title').innerText = QUIZ_CONFIG.topic;
        document.getElementById('time-display-limit').innerText = QUIZ_CONFIG.timeLimitMinutes;

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Đã sửa: Vì data mới không có trường topic, ta sẽ trộn và bốc ngẫu nhiên 20 câu từ tổng ngân hàng
        function selectQuestions() {
            return shuffle(allQuestions).slice(0, 20); 
        }

        function startQuiz() {
            userClass = document.getElementById('user-class').value;
            let rawStt = document.getElementById('user-stt').value.trim();
            let rawName = document.getElementById('user-name').value.trim();

            if (!userClass) { alert("Vui lòng chọn lớp!"); return; }

            let sttNum = parseInt(rawStt, 10);
            if (!/^\d+$/.test(rawStt) || sttNum < 1 || sttNum > 50) {
                alert("STT không hợp lệ! Vui lòng chỉ nhập số nguyên từ 1 đến 50.");
                return;
            }
            userStt = rawStt;

            userName = rawName.replace(/\s+/g, ' ').toLowerCase().replace(/(^|\s)\S/g, l => l.toUpperCase());

            if (userName.length < 3 || userName.length > 50) {
                alert("Họ và tên không hợp lệ (độ dài 3-50, không dùng số/ký hiệu đặc biệt).");
                return;
            }

            questions = selectQuestions();
            
            // Đã sửa: Trích xuất text và image từ mảng options object
            questionStates = questions.map(q => {
                let opts = q.options.map((opt, idx) => ({ 
                    text: opt.text || "", 
                    image: opt.image || "", 
                    originalIndex: idx 
                }));
                return {
                    userSelectedIdx: null,
                    userSelectedText: "",
                    shuffledOptions: shuffle(opts) 
                };
            });

            currentQuestionIndex = 0; scoreCount = 0; userMistakes = []; isSubmitted = false;
            timeLeft = QUIZ_CONFIG.timeLimitMinutes * 60;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('display-info').innerText = `${userName} - Lớp: ${userClass}`;

            startTimer();
            loadQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Hết giờ làm bài! Hệ thống tự động thu bài.");
                    showResult();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60); const sec = timeLeft % 60;
            const timerElem = document.getElementById('timer-text');
            timerElem.innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            if (timeLeft <= 30) timerElem.classList.add('timer-warning');
            else timerElem.classList.remove('timer-warning');
        }

        function loadQuestion() {
            const qData = questions[currentQuestionIndex];
            const state = questionStates[currentQuestionIndex];

            // Hiển thị chữ câu hỏi
            document.getElementById('question-text').innerText = qData.question;
            
            // Xử lý hiển thị ảnh cho câu hỏi
            const qImgContainer = document.getElementById('question-image-container');
            const qImg = document.getElementById('question-image');
            if (qData.image && qData.image.trim() !== "") {
                // Sửa lỗi cú pháp [https... nếu có trong JSON mẫu
                let imgUrl = qData.image.replace(/^\[/, ''); 
                qImg.src = imgUrl;
                qImgContainer.classList.remove('hidden');
            } else {
                qImgContainer.classList.add('hidden');
                qImg.src = "";
            }

            document.getElementById('progress-text').innerText = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            document.getElementById('next-btn').classList.add('hidden');
            
            const prevBtn = document.getElementById('prev-btn');
            if (currentQuestionIndex > 0) {
                prevBtn.classList.remove('hidden');
            } else {
                prevBtn.classList.add('hidden');
            }

            // Đã sửa: Render UI đáp án hỗ trợ cả ảnh và chữ
            state.shuffledOptions.forEach((optObj, index) => {
                const btn = document.createElement('div');
                btn.className = 'option-card group flex items-center p-4 border-2 border-slate-100 rounded-xl cursor-pointer bg-white transition-all';
                
                let optContent = "";
                if (optObj.image && optObj.image.trim() !== "") {
                    optContent += `<img src="${optObj.image}" alt="Option Image" class="max-h-20 rounded shadow-sm border border-slate-200 mr-3">`;
                }
                if (optObj.text && optObj.text.trim() !== "") {
                    optContent += `<span class="flex-1 font-medium text-slate-700">${optObj.text}</span>`;
                }

                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-slate-100 group-hover:bg-blue-100 flex items-center justify-center font-bold mr-4 marker-circle text-slate-600 transition-colors shrink-0">
                        ${String.fromCharCode(65 + index)}
                    </div>
                    ${optContent}
                `;

                if (state.userSelectedIdx === optObj.originalIndex) {
                    btn.classList.add('selected-exam');
                }

                btn.onclick = () => checkAnswer(btn, optObj.originalIndex, optObj.text);
                list.appendChild(btn);
            });

            if (state.userSelectedIdx !== null) {
                showNextButton();
            }
        }

        function checkAnswer(btn, selectedIdx, optionText) {
            const state = questionStates[currentQuestionIndex];

            document.querySelectorAll('.option-card').forEach(b => {
                b.classList.remove('selected-exam');
            });

            btn.classList.add('selected-exam');

            state.userSelectedIdx = selectedIdx;
            state.userSelectedText = optionText;

            showNextButton();
        }

        function showNextButton() {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.classList.remove('hidden');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerHTML = 'Nộp bài thi <i class="fa-solid fa-paper-plane ml-2"></i>';
                nextBtn.classList.replace('bg-blue-600', 'bg-green-600');
                nextBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
            } else {
                nextBtn.innerHTML = 'Câu tiếp <i class="fa-solid fa-arrow-right ml-2"></i>';
                nextBtn.classList.replace('bg-green-600', 'bg-blue-600');
                nextBtn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
            }
        }

        function goNext() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function goPrev() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function showResult() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            
            scoreCount = 0;
            let detailedResults = []; 
            
            questions.forEach((q, index) => {
                const state = questionStates[index];
                let qId = q.id;
                
                if (state.userSelectedIdx === q.correctIndex) {
                    scoreCount++;
                    detailedResults.push(qId);
                } else {
                    // Đã sửa: Trích xuất đúng thuộc tính .text của object thay vì lấy nguyên cục object
                    let wrongText = "Không chọn";
                    if (state.userSelectedIdx !== null && state.userSelectedIdx !== undefined && state.userSelectedIdx !== -1) {
                        wrongText = q.options[state.userSelectedIdx].text || "Hình ảnh";
                    }
                    
                    detailedResults.push(`${qId}|${wrongText}`);
                }
            });

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const totalQuestions = questions.length;
            const originalScore = (scoreCount / totalQuestions) * 10;
            
            let displayScoreCount = scoreCount;
            if (displayScoreCount < totalQuestions / 2) {
                displayScoreCount = totalQuestions / 2;
            }

            const finalScoreVal = (displayScoreCount / totalQuestions) * 10;
            const finalScoreFixed = finalScoreVal.toFixed(1);

            document.getElementById('final-score').innerText = finalScoreFixed;
            document.getElementById('correct-count').innerText = `Số câu đúng: ${displayScoreCount}/${totalQuestions}`;
            document.getElementById('result-user').innerText = `${userName} - Lớp ${userClass} - STT ${userStt}`;

            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-message');

            if (displayScoreCount === totalQuestions) {
                document.getElementById('app').classList.add('perfect-bg');
                title.innerText = "XUẤT SẮC!";
                icon.innerHTML = '<div class="animate-bounce"><i class="fa-solid fa-crown text-7xl text-amber-500"></i></div>';
                msg.innerText = `Chúc mừng! ${userName} đã hoàn thành bài thi xuất sắc.`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                icon.innerHTML = '<i class="fa-solid fa-trophy text-6xl text-green-500"></i>';
                msg.innerText = `Làm tốt lắm! Bạn ${userName} đã vượt qua bài kiểm tra.`;
            }

            const statusText = document.getElementById('save-status');
            const details = detailedResults.join(" || ");
            
            if (QUIZ_CONFIG.googleSheetURL && QUIZ_CONFIG.googleSheetURL.includes("script.google.com")) {
                const formData = new URLSearchParams();
                formData.append("sheetName", QUIZ_CONFIG.sheetName);
                formData.append("topic", QUIZ_CONFIG.topic);
                formData.append("userClass", userClass);
                formData.append("stt", userStt);
                formData.append("name", userName);
                formData.append("score", finalScoreFixed);
                formData.append("totalQuestions", totalQuestions);
                
                const hiddenRealScore = ` [Câu đúng: ${originalScore.toFixed(1)}]`;
                formData.append("questionIds", details + hiddenRealScore);

                fetch(QUIZ_CONFIG.googleSheetURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData.toString()
                })
                .then(response => response.text())
                .then(res => {
                    statusText.innerText = "✅ Kết quả thi đã được lưu trên hệ thống!";
                    statusText.classList.replace("bg-slate-200", "bg-green-100");
                    statusText.classList.replace("text-slate-500", "text-green-700");
                })
                .catch(err => {
                    statusText.innerText = "❌ Lỗi mạng: Không thể nộp kết quả.";
                    statusText.classList.replace("bg-slate-200", "bg-red-100");
                    statusText.classList.replace("text-slate-500", "text-red-700");
                });
            }
        }
    </script>
