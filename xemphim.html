<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Phim Diễn Viên</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #fbbf24; /* Màu vàng hành động */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--accent-color); margin-bottom: 20px; }

        /* Search Bar */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        #search-input {
            padding: 10px 15px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid var(--accent-color);
            background: #1e293b;
            color: white;
        }

        .search-btn {
            padding: 10px 20px;
            background: var(--accent-color);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }

        /* Movie Grid */
        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; }
        .movie-info h3 { font-size: 0.9rem; margin: 5px 0; }

        /* Player Modal */
        #player-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #player-container {
            width: 90%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }
        .close-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--accent-color);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        #loading { text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h1>🎬 PHIM CỦA DIỄN VIÊN</h1>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Nhập tên diễn viên..." value="Thành Long">
        <button class="search-btn" onclick="searchMovies()">TÌM KIẾM</button>
    </div>
</header>

<div id="loading" style="display:none;">Đang tìm phim...</div>
<div id="movie-grid"></div>

<div id="player-modal">
    <div id="player-container">
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>
    <button class="close-btn" onclick="closePlayer()">ĐÓNG</button>
</div>

<script>
    const API_SEARCH = "https://phimapi.com/v1/api/tim-kiem?keyword=";
    const API_DETAIL = "https://phimapi.com/phim/";
    const IMG_DOMAIN = "https://phimimg.com/";

    // 1. Hàm thực hiện tìm kiếm
    async function searchMovies() {
        const keyword = document.getElementById('search-input').value;
        const grid = document.getElementById('movie-grid');
        const loading = document.getElementById('loading');

        if (!keyword) return;

        loading.style.display = 'block';
        grid.innerHTML = '';

        try {
            // Encode từ khóa để tránh lỗi tiếng Việt
            const response = await fetch(API_SEARCH + encodeURIComponent(keyword));
            const result = await response.json();
            
            // API tìm kiếm trả về dữ liệu trong result.data.items
            const movies = result.data.items;

            if (movies.length === 0) {
                loading.innerText = "Không tìm thấy phim nào.";
            } else {
                displayMovies(movies);
                loading.style.display = 'none';
            }
        } catch (error) {
            console.error("Lỗi:", error);
            loading.innerText = "Lỗi khi tải dữ liệu.";
        }
    }

    // 2. Hiển thị danh sách (Duy trì logic xử lý ảnh từ xemphim.html)
    function displayMovies(movies) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = movies.map(movie => {
            const imageUrl = movie.thumb_url.startsWith('http') 
                ? movie.thumb_url 
                : `${IMG_DOMAIN}${movie.thumb_url}`;

            return `
                <div class="movie-card" onclick="playMovie('${movie.slug}')">
                    <img src="${imageUrl}" alt="${movie.name}" onerror="this.src='https://placehold.co/200x300?text=No+Image'">
                    <div class="movie-info">
                        <h3>${movie.name}</h3>
                        <small>${movie.origin_name} (${movie.year})</small>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 3. Play phim (Giữ nguyên logic từ xemphim.html)
    async function playMovie(slug) {
        try {
            const response = await fetch(API_DETAIL + slug);
            const data = await response.json();
            const embedUrl = data.episodes[0].server_data[0].link_embed;
            
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-iframe');
            
            iframe.src = embedUrl;
            modal.style.display = 'flex';
        } catch (error) {
            alert("Lỗi khi lấy link phim!");
        }
    }

    function closePlayer() {
        const modal = document.getElementById('player-modal');
        const iframe = document.getElementById('video-iframe');
        iframe.src = "";
        modal.style.display = 'none';
    }

    // Tự động tìm kiếm ngay khi trang web tải xong
    window.onload = searchMovies;
</script>

</body>
</html>
