<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaDex Viewer v2</title>
    <style>
        /* CSS Reset & Cơ bản */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* Dark theme thân thiện với TV */
            color: #ffffff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: #ff6740; /* Màu đặc trưng của MangaDex */
        }

        /* Lưới hiển thị truyện (Responsive) */
        .manga-grid {
            display: grid;
            /* Tự động điều chỉnh số cột, phù hợp từ điện thoại đến màn hình TV lớn */
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Thẻ truyện */
        .manga-card {
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        /* Quan trọng cho Smart TV: Trạng thái focus khi dùng remote */
        .manga-card:hover, .manga-card:focus {
            transform: scale(1.05);
            outline: 4px solid #ff6740; /* Viền nổi bật để dễ nhìn trên TV */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .manga-cover {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #333;
        }

        .manga-info {
            padding: 15px;
            flex-grow: 1;
        }

        .manga-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            /* Giới hạn 2 dòng để giao diện không bị vỡ */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .manga-status {
            font-size: 0.9rem;
            color: #aaaaaa;
        }

        /* Trạng thái loading */
        #loader {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>Danh Sách Truyện MangaDex</h1>
    
    <div id="loader">Đang tải dữ liệu, vui lòng đợi...</div>
    <div class="manga-grid" id="mangaGrid" style="display: none;"></div>

    <script>
        
        const PROXY_URL = "https://mhbd-two.vercel.app/api/proxy?url="; 

        // 2. Cấu hình API của MangaDex
        // Lấy danh sách truyện, bao gồm ảnh bìa (cover_art), giới hạn 20 truyện, nội dung an toàn
        const MANGADEX_API_URL = "https://api.mangadex.org/manga?includes[]=cover_art&limit=20&contentRating[]=safe";

        // Hàm hỗ trợ: Lấy tên truyện (do MangaDex trả về nhiều ngôn ngữ)
        function getTitle(attributes) {
            if (!attributes || !attributes.title) return "Chưa có tiêu đề";
            return attributes.title.en || Object.values(attributes.title)[0] || "Chưa có tiêu đề";
        }

        // Hàm hỗ trợ: Lấy tên file ảnh bìa từ relationships
        function getCoverFileName(relationships) {
            const coverRel = relationships.find(rel => rel.type === 'cover_art');
            if (coverRel && coverRel.attributes) {
                return coverRel.attributes.fileName;
            }
            return null;
        }

        // Hàm chính: Gọi dữ liệu và render
        async function fetchAndRenderManga() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('mangaGrid');

            try {
                // Mã hóa URL của MangaDex để đưa vào tham số proxy
                const targetUrl = PROXY_URL + encodeURIComponent(MANGADEX_API_URL);
                
                const response = await fetch(targetUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const mangaList = data.data;

                // Xóa trạng thái loading
                loader.style.display = 'none';
                grid.style.display = 'grid';

                // Lặp qua danh sách và tạo HTML
                mangaList.forEach(manga => {
                    const title = getTitle(manga.attributes);
                    const status = manga.attributes.status || "Unknown";
                    const coverFileName = getCoverFileName(manga.relationships);
                    
                    // URL ảnh bìa của MangaDex có cấu trúc: uploads.mangadex.org/covers/{manga.id}/{cover_filename}
                    // Thường ảnh bìa MangaDex không bị chặn CORS khi hiển thị trực tiếp bằng thẻ <img>
                    let coverUrl = 'https://mangadex.org/favicon.ico'; // Ảnh mặc định nếu lỗi
                    if (coverFileName) {
                        coverUrl = `https://uploads.mangadex.org/covers/${manga.id}/${coverFileName}.256.jpg`;
                    }

                    // Khởi tạo thẻ a (có tabindex='0' mặc định, hỗ trợ tivi remote)
                    const card = document.createElement('a');
                    card.href = "#"; // Bạn có thể sửa link này để trỏ tới trang chi tiết truyện
                    card.className = 'manga-card';
                    card.innerHTML = `
                        <img src="${coverUrl}" alt="${title}" class="manga-cover" loading="lazy">
                        <div class="manga-info">
                            <div class="manga-title">${title}</div>
                            <div class="manga-status">Trạng thái: ${status}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Lỗi khi tải truyện:", error);
                loader.textContent = "Không thể tải dữ liệu. Vui lòng kiểm tra lại cấu hình Proxy Vercel của bạn.";
                loader.style.color = "red";
            }
        }

        // Chạy hàm khi trang web tải xong
        document.addEventListener('DOMContentLoaded', fetchAndRenderManga);
    </script>
</body>
</html>
