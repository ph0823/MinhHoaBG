<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word → JSON (Underline Correct Answer)</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
button { padding: 8px 15px; margin-top: 10px; }
pre { background: #f4f4f4; padding: 10px; max-height: 400px; overflow: auto; }
</style>
</head>

<body>

<h2>Upload file Word (.docx)</h2>
<input type="file" id="fileInput" accept=".docx" />
<br>
<button onclick="convert()">Chuyển sang JSON</button>
<button onclick="downloadJSON()">Tải JSON</button>

<h3>Kết quả:</h3>
<pre id="output"></pre>

<script>
let finalData = [];

async function convert() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("Vui lòng chọn file");
        return;
    }

    const arrayBuffer = await file.arrayBuffer();

    const result = await mammoth.convertToHtml({ arrayBuffer });
    const html = result.value;

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    finalData = parseQuestions(doc);

    document.getElementById("output").textContent =
        JSON.stringify(finalData, null, 2);
}

function parseQuestions(doc) {

    const textContent = doc.body.innerHTML;

    // Chuẩn hóa xuống dòng
    const blocks = textContent
        .replace(/<\/p>/g, "\n")
        .replace(/<br\s*\/?>/g, "\n");

    const container = document.createElement("div");
    container.innerHTML = blocks;

    const nodes = [...container.childNodes];

    let questions = [];
    let current = null;
    let id = 1;

    nodes.forEach(node => {

        if (node.nodeType !== 1) return;

        const rawText = node.innerText.trim();

        // ===== CÂU HỎI =====
        if (/^Câu\s+\d+/i.test(rawText)) {

            if (current) questions.push(current);

            current = {
                id: id++,
                question: rawText.replace(/^Câu\s+\d+:\s*/i, ""),
                options: [],
                correctIndex: -1
            };
        }

        // ===== PHÂN TÍCH ĐÁP ÁN (Có thể nhiều đáp án trong 1 paragraph) =====
        else if (current) {

            const optionRegex = /([A-D])\.\s*([^A-D]+)/g;
            let match;

            while ((match = optionRegex.exec(rawText)) !== null) {

                const letter = match[1];
                const optionText = match[2].trim();

                const indexBeforePush = current.options.length;

                current.options.push(optionText);

                // ===== KIỂM TRA UNDERLINE =====
                const letterPattern = new RegExp(letter + "\\.\\s*" + optionText);

                const htmlSegment = node.innerHTML;

                if (
                    htmlSegment.includes("<u>") ||
                    htmlSegment.includes("text-decoration") ||
                    htmlSegment.includes("<strong>")
                ) {
                    // kiểm tra kỹ xem đoạn đó có nằm trong underline không
                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = htmlSegment;

                    const underlined = [...tempDiv.querySelectorAll("u, strong, span")]
                        .some(el => {
                            const style = el.getAttribute("style") || "";
                            return (
                                el.innerText.includes(optionText) &&
                                (el.tagName === "U" ||
                                 el.tagName === "STRONG" ||
                                 style.includes("underline"))
                            );
                        });

                    if (underlined) {
                        current.correctIndex = indexBeforePush;
                    }
                }
            }
        }

    });

    if (current) questions.push(current);

    return questions;
}

function downloadJSON() {
    if (!finalData.length) {
        alert("Chưa có dữ liệu");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(finalData, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "questions.json";
    a.click();
}
</script>

</body>
</html>
