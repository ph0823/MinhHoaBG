<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem tivi qua internet - Hoàn chỉnh cho LG webOS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary-color: #e74c3c;
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #ffffff;
            --focus-color: #f1c40f; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin-top: 20px;
        }

        h1 { text-align: center; color: var(--primary-color); letter-spacing: 1px; margin-bottom: 10px; }

        /* Video Wrapper */
        .player-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            z-index: 1;
            outline: none;
        }

        video:focus {
            box-shadow: inset 0 0 0 4px var(--focus-color);
        }

        #visualizer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 4px;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            z-index: 2;
            pointer-events: none; 
        }

        .bar {
            width: 8px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 4px;
            transition: height 0.05s ease;
            box-shadow: 0 0 15px var(--primary-color);
        }

        /* Nút Recall / Control Bar */
        .controls-bar {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .btn-recall {
            background-color: var(--container-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            outline: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-recall:hover, 
        .btn-recall:focus {
            background-color: var(--primary-color);
            border-color: var(--focus-color);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
            transform: translateY(-2px);
        }

        .btn-recall:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
            background-color: #333;
            transform: none;
            box-shadow: none;
        }

        /* Danh sách kênh */
        .channel-grid {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            max-height: 450px; 
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .channel-grid::-webkit-scrollbar { width: 8px; }
        .channel-grid::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 10px; }
        .channel-grid::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }
        .channel-grid::-webkit-scrollbar-thumb:hover { background: #c0392b; }

        .channel-card {
            background: var(--container-bg);
            padding: 20px 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            font-weight: 500;
            outline: none;
        }

        .channel-card:hover, 
        .channel-card:focus {
            background: var(--primary-color);
            transform: translateY(-3px);
            border-color: var(--focus-color);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }

        .active {
            background: var(--primary-color) !important;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            border-color: #fff;
        }

        .tag {
            display: block;
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .links-section { margin-top: 20px; text-align: center; }
        .links-section a { color: #3498db; text-decoration: none; padding: 10px; display: inline-block; }
        .links-section a:focus, .links-section a:hover { color: var(--focus-color); text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>TIVI <span style="color: #fff;">NGUYÊN</span> NHI</h1>
    
    <div class="player-container">
        <div id="visualizer"></div>
        <video id="video" controls playsinline></video>
    </div>

    <div class="controls-bar">
        <button class="btn-recall" id="btnRecall" tabindex="0" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Kênh vừa xem
        </button>
    </div>

    <div class="channel-grid" id="playlist"></div>

    <div class="links-section">
        <h3><a href="xemphim.html" tabindex="0">Phim</a></h3>
        <p><a href="https://onflixtv.com/dien-vien/jackie-chan-455">Thành Long</a> ||
        <a href="https://www.vn2b.my/xem/phim-chuyen-tinh-harvard-tap-1-thuyet-minh-id-20369" tabindex="0">Chuyện tình Harvard</a></p>
    </div>
</div>

<script>
    const channels = [
        { name: "HTV1", url: "https://live.fptplay53.net/epzhd2/btv1_hls.smil/chunklist.m3u8", type: "tv" },
        { name: "HTV2", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist_b1800000.m3u8", type: "tv" },
        { name: "HTV3", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8", type: "tv" },
        { name: "HTV4", url: "https://live.fptplay53.net/epzhd1/htv4_hls.smil/chunklist_b1800000.m3u8", type: "tv" },
        { name: "HTV7", url: "https://live.fptplay53.net/epzhd1/htv7hd_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        { name: "HTV9", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "SCTV4", url: "https://liveh12.vtvprime.vn/hls/SCTV4/03.m3u8", type: "tv" },
        { name: "SCTV6", url: "https://live.fptplay53.net/epzhd2/film360_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "VTV1", url: "https://live.fptplay53.net/fnxhd1/vtv1hd_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        { name: "VTV3", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist_b1000000.m3u8", type: "tv" },
        { name: "VTV5", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/VTV5HD-avc1_600000=10004-mp4a_131600=20000.m3u8", type: "tv" },
        { name: "VTV9", url: "https://live.fptplay53.net/fnxhd1/vtv9_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },        
        { name: "TN", url: "https://live.fptplay53.net/epzsd1/tayninh01_hls.smil/chunklist_b1800000.m3u8", type: "tv" },
        { name: "THVL1", url: "https://live.fptplay53.net/epzch2/vinhlong1_abr.smil/chunklist.m3u8", type: "tv" },
        { name: "THVL2", url: "https://live.fptplay53.net/epzhd2/vinhlong2_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "THVL3", url: "https://live.fptplay53.net/epzhd2/vinhlong3_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "THVL4", url: "https://live.fptplay53.net/epzhd2/vinhlong4hd_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "VieGT", url: "https://freem3u.xyz/api/live/play.m3u8?vid=180", type: "tv" },
        { name: "VieDr", url: "https://freem3u.xyz/api/live/play.m3u8?vid=177", type: "tv" },        
        { name: "INFO", url: "https://freem3u.xyz/api/live/play.m3u8?vid=189", type: "tv" },
        { name: "Hollywood", url: "https://amg01076-lightningintern-actionhollywood-samsungnz-82rry.amagi.tv/playlist/amg01076-lightningintern-actionhollywood-samsungnz/playlist.m3u8", type: "tv" },
        { name: "VNToday", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        { name: "FM 99.9", url: "https://strm.voh.com.vn/radio/channel1/chunklist_w144246478.m3u8", type: "radio" },
        { name: "VOV GT", url: "https://tfsj1gr4nhct1gwzdrcttfa4urmmoptoz1musp75gq4mbp74go55qchz8c5o.100ycdn.com/play.vovgiaothong.vn/live/gthcm/playlist.m3u8", type: "radio" }
    ];

    const video = document.getElementById('video');
    const visualizer = document.getElementById('visualizer');
    const playlist = document.getElementById('playlist');
    const btnRecall = document.getElementById('btnRecall');
    
    let hls = null;
    let currentChannelIndex = 0;
    let previousChannelIndex = null;
    
    // Audio Context
    let audioCtx, analyser, source;
    const barCount = 40;
    const bars = [];
    let isVisualizerEnabled = true;

    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        visualizer.appendChild(bar);
        bars.push(bar);
    }

    function initAudioVisualizer() {
        if (!isVisualizerEnabled) return;
        try {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) throw new Error("Trình duyệt không hỗ trợ");
                
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(video);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 256;
                animate();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } catch (error) {
            console.warn("Visualizer bị tắt:", error);
            isVisualizerEnabled = false;
            visualizer.style.display = 'none';
        }
    }

    function animate() {
        if (!isVisualizerEnabled) return;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        for (let i = 0; i < barCount; i++) {
            const barHeight = dataArray[i * 2] || 0;
            bars[i].style.height = (barHeight / 2) + 10 + 'px';
            bars[i].style.opacity = (barHeight / 255) + 0.3;
        }
        requestAnimationFrame(animate);
    }

    function playChannel(channel) {
        if (channel.type === "radio" && isVisualizerEnabled) {
            visualizer.style.display = 'flex';
            setTimeout(initAudioVisualizer, 500); 
        } else {
            visualizer.style.display = 'none';
        }

        if (!channel.url.startsWith('http')) {
            alert("Link kênh không hợp lệ!");
            return;
        }

        if (hls) {
            hls.destroy();
        }

        // Ưu tiên chạy Native HLS trước cho Tivi mượt mà
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
            video.play().catch(e => console.log("Cần tương tác"));
        } else if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("Cần tương tác"));
            });
        }
    }

    video.addEventListener('dblclick', toggleFullScreen);

    function toggleFullScreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    }

    // Hàm chuyển về kênh trước đó
    function recallChannel() {
        if (previousChannelIndex !== null) {
            const previousCard = playlist.children[previousChannelIndex];
            if (previousCard) {
                previousCard.focus(); 
                previousCard.click(); 
            }
        }
    }

    // Gắn sự kiện cho nút bấm
    btnRecall.addEventListener('click', recallChannel);

    // Render danh sách kênh
    channels.forEach((ch, index) => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.setAttribute('tabindex', '0');
        card.innerHTML = `${ch.name}${ch.type === 'radio' ? ' <span class="tag">radio</span>' : ''}`;
        
        const triggerPlay = () => {
            // Lưu lại kênh trước đó nếu có sự chuyển đổi kênh
            if (currentChannelIndex !== index) {
                previousChannelIndex = currentChannelIndex;
                currentChannelIndex = index;
                // Kích hoạt nút Recall khi đã có kênh để quay lại
                btnRecall.disabled = false;
            }

            document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
            card.classList.add('active');
            playChannel(ch);
            
            // Tự động cuộn lên xem video trên màn hình Tivi
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Kích hoạt khi bấm chuột (Magic remote)
        card.onclick = triggerPlay;
        
        // Kích hoạt khi bấm nút Enter/OK trên remote D-pad
        card.onkeypress = (e) => {
            if (e.key === 'Enter') triggerPlay();
        };

        playlist.appendChild(card);
        
        if(index === 0) { 
            card.classList.add('active'); 
            playChannel(ch); 
        }
    });

    // Lắng nghe tính năng Recall qua phím cứng
    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 461 || e.key === 'Backspace' || e.key === 'q' || e.key === 'Q') {
            if (previousChannelIndex !== null) {
                e.preventDefault();
                recallChannel();
            }
        }
    });
</script>
</body>
</html>
