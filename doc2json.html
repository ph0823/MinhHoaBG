<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DOCX → JSON (Personal Stable)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:8px; }
textarea { width:100%; height:250px; margin-top:10px; font-family:monospace; }
button { padding:8px 15px; margin-top:10px; cursor:pointer; }
#errorBox { color:red; white-space:pre-wrap; margin-top:10px; }
#stats { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>
<div class="container">

<h2>Chuyển DOCX trắc nghiệm → JSON</h2>

<input type="file" id="fileInput" accept=".docx">
<br>
<button onclick="processFile()">Phân tích</button>
<button onclick="downloadJSON()">Tải JSON</button>

<div id="stats"></div>

<textarea id="output"></textarea>

<div id="errorBox"></div>

</div>

<script>

let validQuestions = [];
let invalidQuestions = [];

async function processFile() {

    validQuestions = [];
    invalidQuestions = [];

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Chọn file docx");

    const arrayBuffer = await file.arrayBuffer();

    const zip = await JSZip.loadAsync(arrayBuffer);
    const xmlText = await zip.file("word/document.xml").async("text");

    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "application/xml");

    const body = xmlDoc.getElementsByTagName("w:body")[0];

    let lines = [];

    for (let node of body.childNodes) {

        if (node.nodeName === "w:p") {
            lines.push(extractParagraph(node));
        }

        if (node.nodeName === "w:tbl") {
            lines.push(...extractTable(node));
        }
    }

    lines = lines.filter(l => l.trim().length > 0);

    parseQuestions(lines);
}

function extractParagraph(pNode) {

    let texts = pNode.getElementsByTagName("w:t");
    let fullText = "";

    for (let t of texts) {
        fullText += t.textContent;
    }

    return fullText.trim();
}

function extractTable(tblNode) {

    let results = [];
    const rows = tblNode.getElementsByTagName("w:tr");

    for (let row of rows) {

        const cells = row.getElementsByTagName("w:tc");

        for (let cell of cells) {

            let texts = cell.getElementsByTagName("w:t");
            let cellText = "";

            for (let t of texts) {
                cellText += t.textContent;
            }

            if (cellText.trim().length > 0)
                results.push(cellText.trim());
        }
    }

    return results;
}

function parseQuestions(lines) {

    let questions = [];
    let current = null;
    let id = 1;

    function pushCurrent() {
        if (current) questions.push(current);
    }

    lines.forEach(line => {

        if (/^Câu\s*\d+/i.test(line)) {

            pushCurrent();

            current = {
                id: id++,
                question: line.replace(/^Câu\s*\d+[:\.]?\s*/i, "").trim(),
                options: [],
                correctIndex: -1
            };
        }

        else if (/^[A-D][\.\)]\s/.test(line) && current) {

            let optionText = line.replace(/^[A-D][\.\)]\s/, "").trim();

            let correct = false;

            if (optionText.includes("*")) {
                correct = true;
                optionText = optionText.replace("*", "").trim();
            }

            if (optionText.toLowerCase().includes("(đúng)")) {
                correct = true;
                optionText = optionText.replace(/\(đúng\)/i, "").trim();
            }

            if (correct)
                current.correctIndex = current.options.length;

            current.options.push(optionText);
        }

    });

    pushCurrent();

    validate(questions);
}

function validate(questions) {

    questions.forEach(q => {

        let errors = [];

        if (q.options.length !== 4)
            errors.push("Không đủ 4 đáp án");

        if (q.correctIndex === -1)
            errors.push("Chưa đánh dấu đáp án đúng");

        if (errors.length > 0)
            invalidQuestions.push({ id:q.id, errors:errors });
        else
            validQuestions.push(q);
    });

    document.getElementById("output").value =
        JSON.stringify(validQuestions, null, 4);

    document.getElementById("stats").innerText =
        `Tổng câu: ${questions.length} | Hợp lệ: ${validQuestions.length} | Lỗi: ${invalidQuestions.length}`;

    let errText = "";
    invalidQuestions.forEach(e => {
        errText += `Câu ${e.id}: ${e.errors.join(", ")}\n`;
    });

    document.getElementById("errorBox").innerText = errText;
}

function downloadJSON() {

    if (invalidQuestions.length > 0) {
        alert("Còn câu lỗi. Sửa trước khi tải.");
        return;
    }

    const blob = new Blob([JSON.stringify(validQuestions, null, 4)],
                          { type: "application/json" });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "questions.json";
    a.click();
}

</script>
</body>
</html>
