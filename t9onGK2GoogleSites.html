<!DOCTYPE html>
<html lang="vi">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-card:hover:not(.disabled) { transform: translateY(-2px); border-color: #3b82f6; background-color: #eff6ff; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .perfect-bg { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border: 4px solid #f59e0b; }
        .timer-warning { color: #ef4444; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 select-none">

        // =========================================================


        let questions = [];
        let questionStates = []; 
        let currentQuestionIndex = 0;
        let scoreCount = 0; 
        let userMistakes = []; 
        
        let userName = "", userClass = "", userStt = "";
        let timerInterval;
        let timeLeft;
        let isSubmitted = false;

        document.getElementById('sub-topic-title').innerText = QUIZ_CONFIG.topic;
        document.getElementById('time-display-limit').innerText = QUIZ_CONFIG.timeLimitMinutes;

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function selectQuestions() {
            const questionLimit = parseInt(document.getElementById('question-limit').value);
            let stats = JSON.parse(localStorage.getItem('t9GoogleSitesStats')) || {};
            let scoredQuestions = allQuestions.map((q, idx) => {
                let qId = q.id || `Câu ${idx + 1}`;
                q._internalId = qId; 
                let stat = stats[qId] || { attempts: 0, wrongFirstTry: 0 };
                let priorityScore = (stat.attempts === 0) ? 100 : (stat.wrongFirstTry / stat.attempts) * 50;
                return { question: q, score: priorityScore + Math.random() * 10 };
            });
            scoredQuestions.sort((a, b) => b.score - a.score);
            let count = Math.min(questionLimit, allQuestions.length);
            return shuffle(scoredQuestions.slice(0, count).map(sq => sq.question));
        }

        function startQuiz() {
            userClass = document.getElementById('user-class').value;
            let rawStt = document.getElementById('user-stt').value.trim();
            let rawName = document.getElementById('user-name').value.trim();

            if (!userClass) { alert("Vui lòng chọn lớp!"); return; }

            let sttNum = parseInt(rawStt, 10);
            if (!/^\d+$/.test(rawStt) || sttNum < 1 || sttNum > 52) {
                alert("STT không hợp lệ! Vui lòng chỉ nhập số nguyên từ 1 đến 52.");
                return;
            }
            userStt = rawStt;

            userName = rawName.replace(/\s+/g, ' ').toLowerCase().replace(/(^|\s)\S/g, l => l.toUpperCase());

            const nameRegex = /^[a-zA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂẠẢẤẦẨẪẬẮẰẲẴẶẸẺẼỀỀỂẾưăạảấầẩẫậắằẳẵặẹẻẽềềểếỄỆỈỊỌỎỐỒỔỖỘỚỜỞỠỢỤỦỨỪễệỉịọỏốồổỗộớờởỡợụủứừỮỰỲỴÝỶỸửữựỳỵỷỹ\s]+$/;
            if (!nameRegex.test(userName) || userName.length < 3 || userName.length > 50) {
                alert("Họ và tên không hợp lệ (độ dài 3-50, không dùng số/ký hiệu đặc biệt).");
                return;
            }
            if (/(.)\1{3,}/.test(userName.replace(/\s/g, ''))) {
                alert("Họ và tên không hợp lệ (phát hiện ký tự lặp lại)!");
                return;
            }

            questions = selectQuestions();
            questionStates = questions.map(q => {
                let opts = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
                return {
                    passed: false,          
                    wrongFirstTry: false,   
                    clickedWrongIdxs: [],   
                    shuffledOptions: shuffle(opts) 
                };
            });

            currentQuestionIndex = 0; scoreCount = 0; userMistakes = []; isSubmitted = false;
            timeLeft = QUIZ_CONFIG.timeLimitMinutes * 60;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('display-info').innerText = `${userName} - Lớp: ${userClass}`;

            startTimer();
            loadQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Hết giờ làm bài! Hệ thống tự động thu bài.");
                    showResult();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60); const sec = timeLeft % 60;
            const timerElem = document.getElementById('timer-text');
            timerElem.innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            if (timeLeft <= 30) timerElem.classList.add('timer-warning');
            else timerElem.classList.remove('timer-warning');
        }

        function loadQuestion() {
            const qData = questions[currentQuestionIndex];
            const state = questionStates[currentQuestionIndex];

            document.getElementById('question-text').innerText = qData.question;
            document.getElementById('progress-text').innerText = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            const feedbackBox = document.getElementById('feedback-text');
            feedbackBox.innerHTML = '';
            document.getElementById('next-btn').classList.add('hidden');

            state.shuffledOptions.forEach((optObj, index) => {
                const btn = document.createElement('div');
                // Giảm padding thẻ bao ngoài (đổi p-4 thành py-2 px-3)
                btn.className = 'option-card group flex items-center py-2 px-3 border-2 border-slate-100 rounded-xl cursor-pointer bg-white transition-all';

                // Thu nhỏ vòng tròn (w-8 h-8), giảm margin phải (mr-3) và điều chỉnh font chữ
                btn.innerHTML = `<div class="w-8 h-8 text-sm rounded-full bg-slate-100 group-hover:bg-blue-100 flex items-center justify-center font-bold mr-3 marker-circle text-slate-600 transition-colors">${String.fromCharCode(65 + index)}</div><span class="flex-1 font-medium text-slate-700 text-[15px]">${optObj.text}</span>`;

                if (state.clickedWrongIdxs.includes(optObj.originalIndex)) {
                    btn.classList.add('wrong', 'disabled', 'opacity-50');
                }

                if (state.passed) {
                    btn.classList.add('disabled');
                    if (optObj.originalIndex === qData.correctIndex) { 
                        btn.classList.add('correct');
                        btn.querySelector('.marker-circle').classList.replace('bg-slate-100', 'bg-green-200');
                        feedbackBox.innerHTML = "<span class='text-green-600'>✅ Em đã hoàn thành câu này.</span>";
                    }
                } else {
                    btn.onclick = () => checkAnswer(btn, optObj.originalIndex, qData.correctIndex, qData._internalId, optObj.text);
                }
                list.appendChild(btn);
            });

            if (state.passed) showNextButton();
        }

        function checkAnswer(btn, selectedIdx, correctIdx, qId, optionText) {
            if (btn.classList.contains('disabled')) return;

            let stats = JSON.parse(localStorage.getItem('t9GoogleSitesStats')) || {};
            if (!stats[qId]) stats[qId] = { attempts: 0, wrongFirstTry: 0 };

            const state = questionStates[currentQuestionIndex];
            const feedbackBox = document.getElementById('feedback-text');
            const qData = questions[currentQuestionIndex];

            if (selectedIdx === correctIdx) {
                btn.classList.add('correct', 'disabled');
                btn.querySelector('.marker-circle').classList.replace('bg-slate-100', 'bg-green-200');
                state.passed = true;
                feedbackBox.innerHTML = "<span class='text-green-600'>✅ Chính xác! Nhấn 'Câu tiếp' để đi tiếp.</span>";

                document.querySelectorAll('.option-card').forEach(b => b.classList.add('disabled'));

                if (!state.wrongFirstTry) {
                    scoreCount++;
                    stats[qId].attempts++;
                    localStorage.setItem('t9GoogleSitesStats', JSON.stringify(stats));
                }
                showNextButton();
            } else {
                btn.classList.add('wrong', 'disabled', 'opacity-50');
                state.clickedWrongIdxs.push(selectedIdx);
                feedbackBox.innerHTML = "<span class='text-red-500 animate-pulse'>❌ Chưa chính xác, hãy thử chọn lại!</span>";

                if (!state.wrongFirstTry) {
                    state.wrongFirstTry = true;
                    stats[qId].attempts++;
                    stats[qId].wrongFirstTry++;
                    localStorage.setItem('t9GoogleSitesStats', JSON.stringify(stats));

                    let correctText = qData.options[qData.correctIndex];
                    userMistakes.push(`[${qId} | Sai: ${optionText} | Đúng: ${correctText}]`);
                }
            }
        }

        function showNextButton() {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.classList.remove('hidden');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerHTML = 'Nộp bài <i class="fa-solid fa-paper-plane ml-2"></i>';
                nextBtn.classList.replace('bg-blue-600', 'bg-green-600');
                nextBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
            } else {
                nextBtn.innerHTML = 'Câu tiếp <i class="fa-solid fa-arrow-right ml-2"></i>';
                nextBtn.classList.replace('bg-green-600', 'bg-blue-600');
                nextBtn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
            }
        }

        function goNext() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const totalQuestions = questions.length;
            const finalScoreVal = (scoreCount / totalQuestions) * 10;
            const finalScoreFixed = finalScoreVal.toFixed(1);

            document.getElementById('final-score').innerText = finalScoreFixed;
            document.getElementById('correct-count').innerText = `Đúng ngay lần đầu: ${scoreCount}/${totalQuestions}`;
            document.getElementById('result-user').innerText = `${userName} - Lớp ${userClass} - STT ${userStt}`;

            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-message');

            // ĐOẠN CODE ĐÃ SỬA
            const ratio = scoreCount / totalQuestions; // Khai báo biến ratio

            if (scoreCount === totalQuestions) {       // Sửa 'score' thành 'scoreCount'
                document.getElementById('app').classList.add('perfect-bg');
                title.innerText = "XUẤT SẮC!";
                icon.innerHTML = '<div class="animate-bounce"><i class="fa-solid fa-crown text-7xl text-amber-500"></i></div>';
                msg.innerText = `Chúc mừng! ${userName} đã hoàn thành xuất sắc.`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else if (ratio >= 0.5) {
                icon.innerHTML = '<i class="fa-solid fa-trophy text-6xl text-green-500"></i>';
                msg.innerText = `Làm tốt lắm! Bạn ${userName} đã nắm vững kiến thức.`;
            } else {
                icon.innerHTML = '<i class="fa-solid fa-book-open text-6xl text-orange-500"></i>';
                msg.innerText = `Đừng nản ${userName}, hãy ôn tập lại.`;
            }
            
            const statusText = document.getElementById('save-status');
            // lưu danh sách câu học sinh đã làm
            let detailedResults = [];
            for (let i = 0; i < questions.length; i++) {
                let q = questions[i];
                let state = questionStates[i];
                let qId = q._internalId;
                
                if (!state.wrongFirstTry) {
                    // Nếu làm đúng ngay lần đầu, chỉ lưu ID câu hỏi
                    detailedResults.push(qId);
                } else {
                    // Nếu làm sai ở lần chọn đầu tiên, lưu ID + Đáp án sai đã chọn + Đáp án đúng
                    let firstWrongIdx = state.clickedWrongIdxs[0]; // index của đáp án sai đầu tiên chọn
                    let wrongText = q.options[firstWrongIdx];
                    let correctText = q.options[q.correctIndex];
                    detailedResults.push(`${qId} | ${wrongText}`);
                }
            }
            const details = detailedResults.join(" || ");

            
            if (QUIZ_CONFIG.googleSheetURL && QUIZ_CONFIG.googleSheetURL.includes("script.google.com")) {
                const formData = new URLSearchParams();
                formData.append("sheetName", QUIZ_CONFIG.sheetName);
                formData.append("topic", QUIZ_CONFIG.topic);
                formData.append("userClass", userClass);
                formData.append("stt", userStt);
                formData.append("name", userName);
                formData.append("score", finalScoreFixed);
                formData.append("totalQuestions", totalQuestions);
                formData.append("questionIds", details);

                fetch(QUIZ_CONFIG.googleSheetURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData.toString()
                })
                .then(response => response.text())
                .then(res => {
                    statusText.innerText = "✅ Kết quả đã được lưu trữ trên hệ thống!";
                    statusText.classList.replace("bg-slate-200", "bg-green-100");
                    statusText.classList.replace("text-slate-500", "text-green-700");
                })
                .catch(err => {
                    statusText.innerText = "❌ Lỗi mạng: Không thể lưu kết quả.";
                    statusText.classList.replace("bg-slate-200", "bg-red-100");
                    statusText.classList.replace("text-slate-500", "text-red-700");
                });
            }
        }

        // HÀM RESET DÀNH RIÊNG CHO GOOGLE SITES
        function resetQuiz() {
            clearInterval(timerInterval);
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('perfect-bg');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
