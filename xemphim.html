<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Phim</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent-color); margin-bottom: 20px; }
        .section-title { margin: 40px 0 20px 0; border-left: 4px solid var(--accent-color); padding-left: 15px; text-transform: uppercase; }

        /* Search Bar */
        .search-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        #search-input { padding: 10px 15px; width: 300px; border-radius: 5px; border: 1px solid var(--accent-color); background: #1e293b; color: white; }
        .search-btn { padding: 10px 20px; background: var(--accent-color); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; }
        .movie-info h3 { font-size: 0.85rem; margin: 5px 0; height: 2.5em; overflow: hidden; }

        /* Player Modal */
        #player-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #player-container { width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { margin-top: 20px; padding: 10px 25px; background: var(--accent-color); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        #loading { text-align: center; font-size: 1.2rem; margin: 20px; }
    </style>
</head>
<body>

<header>
    <h1>🎬 THẾ GIỚI PHIM TRỰC TUYẾN</h1>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Tìm tên phim hoặc diễn viên..." value="Thành Long">
        <button class="search-btn" onclick="searchMovies()">TÌM KIẾM</button>
    </div>
</header>

<div id="loading" style="display:none;">Đang tải dữ liệu...</div>

<div id="default-content">
    <h2 class="section-title">📺 Phim Bộ Hàn Quốc</h2>
    <div id="korea-series-grid" class="movie-grid"></div>

    <h2 class="section-title">⚔️ Phim Lẻ Hành Động</h2>
    <div id="action-movies-grid" class="movie-grid"></div>
</div>

<div id="search-results" style="display:none;">
    <h2 class="section-title">🔍 Kết quả tìm kiếm</h2>
    <div id="search-grid" class="movie-grid"></div>
    <button class="close-btn" style="display:block; margin: 20px auto;" onclick="backToHome()">QUAY LẠI TRANG CHỦ</button>
</div>

<div id="player-modal">
    <div id="player-container">
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>
    <button class="close-btn" onclick="closePlayer()">ĐÓNG</button>
</div>

<script>
    const API_SEARCH = "https://phimapi.com/v1/api/tim-kiem?keyword=";
    const API_LIST = "https://phimapi.com/v1/api/danh-sach/";
    const API_DETAIL = "https://phimapi.com/phim/";
    const IMG_DOMAIN = "https://phimimg.com/";

    // 1. Tải danh sách mặc định khi mở trang
    async function loadDefaultLists() {
        document.getElementById('loading').style.display = 'block';
        
        // Lấy phim bộ Hàn Quốc
        await fetchAndDisplay(`${API_LIST}phim-bo?country=han-quoc`, 'korea-series-grid');
        
        // Lấy phim lẻ Hành động
        await fetchAndDisplay(`${API_LIST}phim-le?category=hanh-dong`, 'action-movies-grid');
        
        document.getElementById('loading').style.display = 'none';
    }

    async function fetchAndDisplay(url, gridId) {
        try {
            const response = await fetch(url);
            const result = await response.json();
            const movies = result.data.items;
            displayMovies(movies, gridId);
        } catch (error) {
            console.error("Lỗi tải danh sách:", error);
        }
    }

    // 2. Hàm tìm kiếm
    async function searchMovies() {
        const keyword = document.getElementById('search-input').value;
        if (!keyword) return;

        document.getElementById('default-content').style.display = 'none';
        document.getElementById('search-results').style.display = 'block';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('search-grid').innerHTML = '';

        try {
            const response = await fetch(API_SEARCH + encodeURIComponent(keyword));
            const result = await response.json();
            displayMovies(result.data.items, 'search-grid');
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            alert("Lỗi tìm kiếm!");
        }
    }

    function backToHome() {
        document.getElementById('default-content').style.display = 'block';
        document.getElementById('search-results').style.display = 'none';
    }

    // 3. Hiển thị danh sách phim vào container chỉ định
    function displayMovies(movies, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = movies.map(movie => {
            const imageUrl = movie.thumb_url.startsWith('http') 
                ? movie.thumb_url 
                : `${IMG_DOMAIN}${movie.thumb_url}`;

            return `
                <div class="movie-card" onclick="playMovie('${movie.slug}')">
                    <img src="${imageUrl}" alt="${movie.name}" onerror="this.src='https://placehold.co/200x300?text=No+Image'">
                    <div class="movie-info">
                        <h3>${movie.name}</h3>
                        <small>${movie.year}</small>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 4. Trình phát phim
    async function playMovie(slug) {
        try {
            const response = await fetch(API_DETAIL + slug);
            const data = await response.json();
            const embedUrl = data.episodes[0].server_data[0].link_embed;
            document.getElementById('video-iframe').src = embedUrl;
            document.getElementById('player-modal').style.display = 'flex';
        } catch (error) {
            alert("Lỗi link phim!");
        }
    }

    function closePlayer() {
        document.getElementById('video-iframe').src = "";
        document.getElementById('player-modal').style.display = 'none';
    }

    window.onload = loadDefaultLists;
</script>
</body>
</html>
