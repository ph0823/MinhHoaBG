<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem tin qua internet</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary-color: #e74c3c;
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #ffffff;
            --focus-color: #f1c40f; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin-top: 20px;
        }

        h1 { text-align: center; color: var(--primary-color); letter-spacing: 1px; margin-bottom: 10px; }

        .app-container {
            width: 100%;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        video { width: 100%; height: 100%; z-index: 1; outline: none; }
        video:focus { box-shadow: inset 0 0 0 4px var(--focus-color); }
        video::-webkit-media-controls-fullscreen-button { display: none !important; }

        /* --- VISUALIZER SÓNG NHẠC CSS (SỬA LỖI KHÔNG PHÁT ĐƯỢC RADIO) --- */
        #visualizer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 6px;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            z-index: 2;
            pointer-events: none; 
        }

        .bar {
            width: 10px;
            height: 60px;
            background: var(--primary-color);
            border-radius: 4px;
            box-shadow: 0 0 15px var(--primary-color);
        }

        /* Hiệu ứng sóng nhảy tự động bằng CSS Animation khi phát Radio để tránh lỗi CORS */
        .animated-bar {
            animation: bounce 1.2s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            0% { transform: scaleY(0.2); opacity: 0.4; }
            100% { transform: scaleY(1.2); opacity: 1; }
        }

        .channel-grid {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 350px; 
            overflow-y: auto;
            background: #1a1a1a;
        }

        .channel-grid::-webkit-scrollbar { width: 8px; }
        .channel-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 10px; }
        .channel-grid::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        /* --- CHẾ ĐỘ OVERLAY CHO PC / TV / TABLET (>= 768px) --- */
        @media (min-width: 768px) {
            .app-container {
                position: relative;
                display: block;
            }

            .channel-grid {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 40%; 
                max-height: none;
                background: rgba(20, 20, 20, 0.9); 
                backdrop-filter: blur(10px); 
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 0 0 12px 12px;
                z-index: 1000; 
                transform: translateY(100%);
                opacity: 0;
                pointer-events: none;
                transition: all 0.3s ease-out;
            }

            .app-container.show-overlay .channel-grid,
            .channel-grid:focus-within {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }
        }

        .app-container.fullscreen-mode {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            max-width: none !important;
            border-radius: 0 !important;
            z-index: 9999 !important;
            margin: 0 !important;
        }

        .app-container.fullscreen-mode .player-wrapper {
            height: 100%;
            aspect-ratio: auto; 
        }
        
        .app-container.fullscreen-mode .channel-grid { border-radius: 0; }

        .channel-card {
            background: var(--container-bg);
            padding: 18px 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            font-weight: 500;
            outline: none;
        }

        .channel-card:hover, .channel-card:focus {
            background: var(--primary-color);
            transform: translateY(-3px);
            border-color: var(--focus-color);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }

        .active {
            background: var(--primary-color) !important;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            border-color: #fff;
        }

        .tag { display: block; font-size: 10px; margin-top: 5px; opacity: 0.8; text-transform: uppercase; color: #f1c40f; }

        .controls-bar { display: flex; justify-content: center; margin-top: 25px; }

        .btn-recall {
            background-color: var(--container-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            outline: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-recall:hover, .btn-recall:focus {
            background-color: var(--primary-color);
            border-color: var(--focus-color);
            transform: translateY(-2px);
        }

        .btn-recall:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; background-color: #333; transform: none; }

        .links-section { margin-top: 20px; text-align: center; }
        .links-section a { color: #3498db; text-decoration: none; padding: 10px; display: inline-block; }
        .links-section a:focus, .links-section a:hover { color: var(--focus-color); text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">

    <div class="app-container" id="appContainer">
        <div class="player-wrapper">

            <!-- Bổ sung crossorigin để giảm lỗi chặn luồng trên Tivi -->

            Kênh vừa xem
        </button>

</div>

<script>
    const channels = [
        { name: "HTV1", url: "https://live.fptplay53.net/epzhd2/btv1_hls.smil/chunklist.m3u8", type: "tv" },
        { name: "HTV2", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist_b1800000.m3u8", type: "tv" },
        { name: "HTV3", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8", type: "tv" },
        { name: "HTV4", url: "https://live.fptplay53.net/epzhd1/htv4_hls.smil/chunklist_b1800000.m3u8", type: "tv" },
        { name: "HTV7", url: "https://live.fptplay53.net/epzhd1/htv7hd_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        { name: "HTV9", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "SCTV4", url: "https://liveh12.vtvprime.vn/hls/SCTV4/03.m3u8", type: "tv" },
        { name: "SCTV6", url: "https://live.fptplay53.net/epzhd2/film360_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "VTV1", url: "https://live.fptplay53.net/fnxhd1/vtv1hd_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },

        //{ name: "VTV3", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist_b1000000.m3u8", type: "tv" },
        //{ name: "VTV5", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/VTV5HD-avc1_600000=10004-mp4a_131600=20000.m3u8", type: "tv" },
        //https://vtvgolive-ssaimh.vtvdigital.vn/4ZR-DGXrVEimB6w4rw0HIw/1781732113/manifest/vtv5/master.m3u8
        
        { name: "VTV3", url: "https://live.fptplay53.net/fnxhd1/vtv3hd_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        { name: "VTV5", url: "https://vtvgolive-ssaimh.vtvdigital.vn/4ZR-DGXrVEimB6w4rw0HIw/1781732113/manifest/vtv5/playlist_720p.m3u8", type: "tv" },
        { name: "TN", url: "https://live.fptplay53.net/epzsd1/tayninh01_hls.smil/chunklist_b1800000.m3u8", type: "tv" },
        { name: "THVL1", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        { name: "THVL2", url: "https://live.fptplay53.net/epzhd2/vinhlong2_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "THVL3", url: "https://live.fptplay53.net/epzhd2/vinhlong3_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "THVL4", url: "https://live.fptplay53.net/epzhd2/vinhlong4hd_vhls.smil/chunklist.m3u8", type: "tv" },
        { name: "VieGT", url: "https://freem3u.xyz/api/live/play.m3u8?vid=180", type: "tv" },
        { name: "VieDr", url: "https://freem3u.xyz/api/live/play.m3u8?vid=177", type: "tv" },        
        { name: "INFO", url: "https://freem3u.xyz/api/live/play.m3u8?vid=189", type: "tv" },
        { name: "Hollywood", url: "https://amg01076-lightningintern-actionhollywood-samsungnz-82rry.amagi.tv/playlist/amg01076-lightningintern-actionhollywood-samsungnz/playlist.m3u8", type: "tv" },
        { name: "VNToday", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8", type: "tv" },
        
        // Link Radio
        //{ name: "FM 99.9", url: "https://strm.voh.com.vn/radio/channel1/chunklist_w144246478.m3u8", type: "radio" },
        //{ name: "VOV GT", url: "https://tfsj1gr4nhct1gwzdrcttfa4urmmoptoz1musp75gq4mbp74go55qchz8c5o.100ycdn.com/play.vovgiaothong.vn/live/gthcm/playlist.m3u8", type: "radio" }

         
        { name: "FM 99.9", url: "https://strm.voh.com.vn/radio/StreamCH3/playlist.m3u8", type: "radio" },
        { name: "VOV GT", url: "https://play.vovgiaothong.vn/live/gthn/playlist.m3u8", type: "radio" }
    ];

    const video = document.getElementById('video');
    const visualizer = document.getElementById('visualizer');
    const playlist = document.getElementById('playlist');
    const btnRecall = document.getElementById('btnRecall');
    const appContainer = document.getElementById('appContainer'); 
    
    let hls = null;
    let currentChannelIndex = 0;
    let previousChannelIndex = null;
    let hideOverlayTimeout; 
    const barCount = 25; // Giảm số lượng bar xuống một chút để hiển thị đẹp hơn trên TV

    // Tạo các cột sóng nhạc CSS tĩnh trước
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        // Tạo độ trễ animation (delay) ngẫu nhiên để các cột nhảy so le tự nhiên
        bar.style.animationDelay = `${Math.random() * 0.8}s`;
        visualizer.appendChild(bar);
    }

    // --- ĐIỀU KHIỂN ĐÓNG/MỞ DANH SÁCH (OVERLAY) ---
    function showOverlayMenu() {
        if (window.innerWidth < 768) return;
        appContainer.classList.add('show-overlay');
        resetHideTimeout();
    }

    function hideOverlayMenu() {
        if (window.innerWidth >= 768) {
            appContainer.classList.remove('show-overlay');
            clearTimeout(hideOverlayTimeout);
        }
    }

    function resetHideTimeout() {
        clearTimeout(hideOverlayTimeout);
        hideOverlayTimeout = setTimeout(() => {
            // Nếu người dùng đang tập trung (focus) remote/bàn phím vào các nút trong list, không tự ẩn menu
            if (!playlist.contains(document.activeElement)) {
                appContainer.classList.remove('show-overlay');
            } else {
                resetHideTimeout(); // Gia hạn thêm thời gian nếu vẫn đang tương tác
            }
        }, 5000); 
    }

    // Sự kiện Chuột PC
    appContainer.addEventListener('mousemove', (e) => {
        const rect = appContainer.getBoundingClientRect();
        const relativeY = e.clientY - rect.top;
        if (relativeY > rect.height * 0.4) {
            showOverlayMenu();
        }
    });
    appContainer.addEventListener('mouseleave', hideOverlayMenu);

    // Sự kiện Click/Touch Tablet
    appContainer.addEventListener('click', (e) => {
        if (window.innerWidth < 768) return; 
        if (e.target.closest('.channel-grid')) {
            resetHideTimeout();
            return;
        }
        appContainer.classList.toggle('show-overlay');
        if (appContainer.classList.contains('show-overlay')) resetHideTimeout();
    });

    // --- LOGIC PHÁT VIDEO / RADIO ---
    function playChannel(channel) {
        if (channel.type === "radio") {
            visualizer.style.display = 'flex';
            // Kích hoạt animation nhảy sóng CSS cho tất cả các bar
            document.querySelectorAll('.bar').forEach(bar => bar.classList.add('animated-bar'));
        } else {
            visualizer.style.display = 'none';
            // Tắt animation để tiết kiệm CPU khi xem Tivi thường
            document.querySelectorAll('.bar').forEach(bar => bar.classList.remove('animated-bar'));
        }

        if (hls) hls.destroy();

        if (Hls.isSupported()) {
            hls = new Hls({
                maxMaxBufferLength: 10 // Giới hạn buffer ngắn lại giúp Tivi load kênh nhanh hơn
            });
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("Chờ tương tác từ người dùng"));
            });
            hls.on(Hls.ErrorTypes.NETWORK_ERROR, () => {
                console.log("Lỗi mạng luồng stream, đang thử lại...");
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Dành riêng cho trình duyệt Safari PC hoặc một số dòng LG webOS / Tizen TV hỗ trợ sẵn HLS gốc
            video.src = channel.url;
            video.play().catch(e => console.log("Chờ tương tác"));
        }
    }

    video.addEventListener('dblclick', toggleFullScreen);
    function toggleFullScreen() {
        appContainer.classList.toggle('fullscreen-mode');
        document.body.style.overflow = appContainer.classList.contains('fullscreen-mode') ? 'hidden' : '';
    }

    // --- RECALL KÊNH VỪA XEM ---
    function recallChannel() {
        if (previousChannelIndex !== null) {
            const previousCard = playlist.children[previousChannelIndex];
            if (previousCard) {
                showOverlayMenu();
                previousCard.click(); 
                setTimeout(() => previousCard.focus(), 100);
            }
        }
    }

    btnRecall.addEventListener('click', recallChannel);

    // --- RENDER DANH SÁCH KÊNH ---
    channels.forEach((ch, index) => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.setAttribute('tabindex', '0'); // Giúp Remote Tivi có thể bắt được tiêu điểm (Focus)
        card.innerHTML = `${ch.name}${ch.type === 'radio' ? ' <span class="tag">radio</span>' : ''}`;
        
        const triggerPlay = (e) => {
            if (e) e.stopPropagation();

            if (currentChannelIndex !== index) {
                previousChannelIndex = currentChannelIndex;
                currentChannelIndex = index;
                btnRecall.disabled = false;
            }

            document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
            card.classList.add('active');
            playChannel(ch);
            
            // Ẩn nhẹ overlay sau khi đổi kênh thành công
            setTimeout(hideOverlayMenu, 300);
            video.focus(); 
        };

        card.onclick = triggerPlay;
        card.onkeydown = (e) => { if (e.key === 'Enter') triggerPlay(e); };
        
        // Khi dùng phím điều hướng Remote TV di chuyển vào thẻ nào, tự động hiện Overlay Menu lên
        card.onfocus = () => { showOverlayMenu(); };

        playlist.appendChild(card);
        
        if(index === 0) { 
            card.classList.add('active'); 
            playChannel(ch); 
        }
    });

    // --- HỖ TRỢ PHÍM BACK / RETURN TRÊN REMOTE SMART TV (LG webOS & Android TV) ---
    window.history.pushState({ noExit: true }, '', window.location.href);
    window.addEventListener('popstate', function(event) {
        recallChannel();
        window.history.pushState({ noExit: true }, '', window.location.href);
    });

    document.addEventListener('keydown', (e) => {
        // Mã phím 461 là nút BACK trên điều khiển LG webOS, 27 là Esc PC
        if (e.key === 'Backspace' || e.keyCode === 461 || e.key === 'Escape') {
            if (appContainer.classList.contains('fullscreen-mode')) {
                e.preventDefault();
                toggleFullScreen();
            } else if (previousChannelIndex !== null) {
                e.preventDefault();
                recallChannel();
            }
        }
    });
</script>
</body>
