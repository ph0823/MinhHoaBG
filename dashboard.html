<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quản Lý Điểm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-6">

    <div class="max-w-6xl mx-auto glass rounded-2xl shadow-xl overflow-hidden flex flex-col">
        
        <div class="p-6 border-b border-slate-200 bg-white flex flex-wrap gap-4 items-end justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 mb-2"><i class="fa-solid fa-chart-line text-blue-600 mr-2"></i>Bảng Điểm Học Sinh</h1>
                <p class="text-sm text-slate-500">Quản lý và theo dõi tiến độ làm bài trắc nghiệm</p>
            </div>
            
            <div class="flex gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Tên Sheet (Bài kiểm tra)</label>
                    <select id="filter-sheet" class="px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                        <option value="K9onGK2">K9onGK2</option>
                        <option value="K9GiuaKy">K9GiuaKy</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Lớp</label>
                    <select id="filter-class" class="px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                        <option value="all">Tất cả các lớp</option>
                        <option value="9a1">9.1</option>
                        <option value="9a2">9.2</option>
                        <option value="9a3">9.3</option>
                        <option value="9a4">9.4</option>
                        <option value="9a5">9.5</option>
                        <option value="9a14">9.14</option>
                        <option value="9a15">9.15</option>
                        <option value="9a16">9.16</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="missing-stt-container" class="mt-4 p-4 bg-orange-50 rounded-xl border border-orange-100 hidden transition-all mx-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3">
                <h3 class="font-bold text-slate-700"><i class="fa-solid fa-user-clock text-orange-500 mr-2"></i>Học sinh chưa nộp bài (STT):</h3>
                
                <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm w-fit">
                    <label for="max-students" class="text-sm font-semibold text-slate-500 whitespace-nowrap">Sĩ số lớp:</label>
                    <input type="number" id="max-students" value="50" min="1" max="100" class="w-16 px-2 py-1 bg-slate-50 border border-slate-200 rounded text-center text-blue-600 font-bold focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateView()">
                </div>
            </div>
            <div id="missing-stt-list" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="p-6 bg-slate-50 flex flex-wrap justify-between items-center border-b gap-4">
            
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-slate-700">Lọc điểm trùng lặp:</span>
                <select id="score-method" class="px-3 py-1.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white text-sm font-medium text-blue-700 shadow-sm transition-all" onchange="updateView()">
                    <option value="highest">Lấy điểm cao nhất</option>
                    <option value="first">Lấy điểm làm lần đầu</option>
                </select>
            </div>

            <div class="flex flex-col gap-2 items-end">
                <span class="text-sm font-bold text-slate-700">Sắp xếp theo:</span>
                <div class="flex bg-slate-200 p-1 rounded-lg">
                    <button onclick="sortData('stt')" id="btn-sort-stt" class="px-3 py-1 text-sm rounded bg-white shadow-sm font-bold text-blue-600 transition-all">STT Tăng dần</button>
                    <button onclick="sortData('score')" id="btn-sort-score" class="px-3 py-1 text-sm rounded hover:bg-white text-slate-600 font-medium transition-all">Điểm Giảm dần</button>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto p-6 bg-white">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b-2 border-slate-200 text-sm uppercase tracking-wider text-slate-500">
                        <th class="py-3 px-4">Lớp</th>
                        <th class="py-3 px-4">STT</th>
                        <th class="py-3 px-4">Họ và Tên</th>
                        <th class="py-3 px-4">Điểm</th>
                        <th class="py-3 px-4 w-1/2">Chi tiết bài làm (Các câu sai)</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-slate-700">
                </tbody>
            </table>
        </div>
    </div>

    <script>
    // --- 1. CẤU HÌNH API ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyN-3m_Z_-3Z6yaj_FO1NhGAlICmheLfCG-_LfPWgKOLYHixbvvJzlH2KN9vy97Z7oc/exec"; 

    let allData = []; 
    let currentSort = 'stt'; 

    // --- 2. HÀM KHỞI TẠO & LẮNG NGHE SỰ KIỆN ---
    document.getElementById('filter-sheet').addEventListener('change', (e) => {
        fetchDataFromServer(e.target.value);
    });
    
    document.getElementById('filter-class').addEventListener('change', updateView);

    const initialSheet = document.getElementById('filter-sheet').value;
    fetchDataFromServer(initialSheet);

    // --- 3. HÀM GỌI DỮ LIỆU TỪ GOOGLE APPS SCRIPT ---
    async function fetchDataFromServer(sheetName) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-blue-500 font-medium"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang tải dữ liệu từ hệ thống...</td></tr>`;
        
        try {
            const response = await fetch(`${SCRIPT_URL}?sheet=${sheetName}`);
            const rawJson = await response.json();

            if (rawJson.error) {
                console.warn(rawJson.error);
                allData = [];
            } else {
                allData = rawJson.map(row => {
                    let rawClass = row["Lớp"] ? row["Lớp"].toString() : "";
                    if (rawClass.startsWith("'")) rawClass = rawClass.substring(1);

                    return {
                        sheet: row.sheetName,
                        userClass: rawClass,
                        stt: parseInt(row["STT"]) || 0,
                        name: row["Họ Tên"] || "Chưa rõ",
                        score: parseFloat(row["Điểm Số"]) || 0,
                        details: row["ID câu hỏi"] || ""
                    };
                });
            }
            
            updateView();
            
        } catch (error) {
            console.error("Lỗi khi tải dữ liệu:", error);
            tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-red-500 font-medium">❌ Không thể kết nối tới máy chủ. Vui lòng kiểm tra lại đường dẫn Web App.</td></tr>`;
        }
    }

    // --- 4. HÀM CẬP NHẬT GIAO DIỆN CHÍNH (Đã xử lý gộp STT) ---
    function updateView() {
        const selectedClass = document.getElementById('filter-class').value;
        const scoreMethod = document.getElementById('score-method').value; // 'highest' hoặc 'first'

        // 4.1 Lọc theo lớp
        let filtered = [...allData];
        if (selectedClass !== 'all') {
            filtered = filtered.filter(item => item.userClass === selectedClass);
        }

        // 4.2 Gộp dữ liệu học sinh làm nhiều lần
        const studentMap = new Map();

        filtered.forEach(row => {
            // Tạo khóa duy nhất cho mỗi học sinh: Lớp + STT
            const uniqueKey = `${row.userClass}-${row.stt}`;
            
            if (!studentMap.has(uniqueKey)) {
                // Lần đầu tiên bắt gặp học sinh này trong danh sách
                studentMap.set(uniqueKey, { ...row, attemptCount: 1 });
            } else {
                // Học sinh đã tồn tại (làm lại lần 2, lần 3...)
                let existingRecord = studentMap.get(uniqueKey);
                let newAttemptCount = existingRecord.attemptCount + 1; // Tăng bộ đếm
                
                if (scoreMethod === 'highest') {
                    // Nếu chế độ lấy điểm cao nhất và điểm lần này cao hơn hiện tại
                    if (row.score > existingRecord.score) {
                        studentMap.set(uniqueKey, { ...row, attemptCount: newAttemptCount });
                    } else {
                        // Điểm thấp hơn thì giữ nguyên bài làm tốt nhất, nhưng vẫn cập nhật số lần làm
                        existingRecord.attemptCount = newAttemptCount;
                    }
                } else if (scoreMethod === 'first') {
                    // Nếu chế độ lấy lần đầu, ta giữ nguyên existingRecord vì nó là bản ghi đầu tiên,
                    // chỉ cập nhật tổng số lần làm bài.
                    existingRecord.attemptCount = newAttemptCount;
                }
            }
        });

        // Chuyển kết quả đã gộp từ Map về lại Array
        let processedData = Array.from(studentMap.values());

        // 4.3 Sắp xếp dữ liệu sau khi gộp
        if (currentSort === 'stt') {
            processedData.sort((a, b) => a.stt - b.stt);
        } else {
            processedData.sort((a, b) => b.score - a.score); 
        }

        // 4.4 Cập nhật bảng và thống kê
        renderTable(processedData);
        updateMissingStts(processedData); 
    }

    // --- 5. HÀM HIỂN THỊ BẢNG ĐIỂM ---
    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-500 font-medium">Chưa có dữ liệu học sinh làm bài cho lựa chọn này.</td></tr>`;
            return;
        }

        data.forEach(row => {
            let scoreColor = row.score >= 8 ? 'text-green-600' : (row.score >= 5 ? 'text-amber-500' : 'text-red-500');
            
            let detailsHtml = "";
            if (row.score === 10) {
                detailsHtml = `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-check"></i> Tuyệt đối</span>`;
            } else if (row.score <= 5) {
                detailsHtml = `<span class="text-slate-400 text-xs italic"><i class="fa-solid fa-eye-slash mr-1"></i>Không hỗ trợ xem chi tiết</span>`;
            } else {
                if (!row.details || row.details.trim() === "") {
                    detailsHtml = `<span class="text-slate-400 text-xs">Không có dữ liệu</span>`;
                } else {
                    detailsHtml = `<span class="text-xs text-slate-600 leading-relaxed block">${row.details}</span>`;
                }
            }

            // Tạo nhãn (Badge) nếu học sinh làm bài nhiều hơn 1 lần
            let attemptBadge = row.attemptCount > 1 
                ? `<span class="ml-2 inline-flex items-center justify-center px-2 py-0.5 text-[10px] font-bold bg-purple-100 text-purple-700 rounded-full" title="Học sinh này đã làm bài ${row.attemptCount} lần"><i class="fa-solid fa-rotate-right mr-1"></i> Làm ${row.attemptCount} lần</span>` 
                : '';

            let tr = document.createElement('tr');
            tr.className = "border-b border-slate-100 hover:bg-slate-50 transition-colors";
            tr.innerHTML = `
                <td class="py-3 px-4 font-semibold">${row.userClass}</td>
                <td class="py-3 px-4 text-slate-500 font-mono">${row.stt}</td>
                <td class="py-3 px-4 font-bold text-slate-800">${row.name} ${attemptBadge}</td>
                <td class="py-3 px-4 font-black ${scoreColor} text-lg">${row.score.toFixed(1)}</td>
                <td class="py-3 px-4 max-w-xs truncate" title="${row.details}">${detailsHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 6. HÀM TÌM HỌC SINH CHƯA LÀM BÀI ---
    function updateMissingStts(data) {
        const missingContainer = document.getElementById('missing-stt-container');
        const missingDiv = document.getElementById('missing-stt-list');
        
        const maxStudents = parseInt(document.getElementById('max-students').value) || 50;
        const currentClass = document.getElementById('filter-class').value;

        if (currentClass === 'all') {
            missingContainer.classList.add('hidden');
            return;
        }

        missingContainer.classList.remove('hidden');

        if (data.length === 0) {
            missingDiv.innerHTML = "<span class='text-slate-500 italic'>Chưa có dữ liệu để thống kê.</span>";
            return;
        }

        const submittedStts = data.map(item => item.stt);
        let missing = [];

        for (let i = 1; i <= maxStudents; i++) {
            if (!submittedStts.includes(i)) {
                missing.push(i);
            }
        }

        if (missing.length === 0) {
            missingDiv.innerHTML = "<span class='text-green-600 font-bold'>✅ 100% học sinh lớp đã hoàn thành bài!</span>";
        } else {
            missingDiv.innerHTML = missing.map(stt => 
                `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold shadow-sm">STT: ${stt}</span>`
            ).join('');
        }
    }

    // --- 7. HÀM XỬ LÝ SẮP XẾP ---
    function sortData(type) {
        currentSort = type;
        
        const btnStt = document.getElementById('btn-sort-stt');
        const btnScore = document.getElementById('btn-sort-score');

        if (type === 'stt') {
            btnStt.className = "px-3 py-1 text-sm rounded bg-white shadow-sm font-bold text-blue-600 transition-all";
            btnScore.className = "px-3 py-1 text-sm rounded hover:bg-white text-slate-600 font-medium transition-all";
        } else {
            btnScore.className = "px-3 py-1 text-sm rounded bg-white shadow-sm font-bold text-blue-600 transition-all";
            btnStt.className = "px-3 py-1 text-sm rounded hover:bg-white text-slate-600 font-medium transition-all";
        }

        updateView();
    }
    </script>
</body>
</html>
